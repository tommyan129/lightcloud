<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 — LightCloud</title>
<link rel="stylesheet" href="/static/css/lightcloud.css">
<script>
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
</script>
<style>
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}
</style>
</head>
<body>

<button class="dark-toggle auth-theme-btn" id="btnTheme" title="Toggle dark mode">
  <svg id="iconMoon" width="15" height="15" viewBox="0 0 16 16" fill="none">
    <path d="M13.5 10A6 6 0 0 1 6 2.5a6 6 0 1 0 7.5 7.5z" fill="currentColor"/>
  </svg>
  <svg id="iconSun" width="15" height="15" viewBox="0 0 16 16" fill="none" data-hidden>
    <circle cx="8" cy="8" r="3" fill="currentColor"/>
    <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </svg>
</button>

<div class="auth-wrap">

  <div class="auth-brand">
    <div class="logo-mark">
      <svg width="20" height="20" viewBox="0 0 14 14" fill="none">
        <path d="M7 1C4.2 1 2 3.2 2 6c-1.1 0-2 .9-2 2s.9 2 2 2h10c1.1 0 2-.9 2-2s-.9-2-2-2c0-2.8-2.2-5-5-5z" fill="white"/>
      </svg>
    </div>
    <h1>LightCloud</h1>
    <p>새 계정을 만드세요</p>
  </div>

  <div class="auth-card">
    <form id="register-form" method="POST" action="/register" style="display:contents">

      <div class="auth-field">
        <label for="username">사용자 명</label>
        <div class="auth-input-wrap">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="6" r="3" stroke="currentColor" stroke-width="1.4"/>
            <path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="text" id="username" name="username" placeholder="아이디 입력" autocomplete="username" required>
        </div>
        <div class="field-hint" id="usernameHint"></div>
      </div>

      <div class="auth-field">
        <label for="password">비밀번호</label>
        <div class="auth-input-wrap">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 7V5a3 3 0 1 1 6 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="password" id="password" name="password" placeholder="비밀번호 입력" autocomplete="new-password" required>
        </div>
        <div class="pw-strength" id="pwStrength">
          <div class="pw-strength-bar" id="bar1"></div>
          <div class="pw-strength-bar" id="bar2"></div>
          <div class="pw-strength-bar" id="bar3"></div>
        </div>
        <div class="field-hint" id="pwHint"></div>
      </div>

      <div class="auth-field">
        <label for="re_password">비밀번호 재입력</label>
        <div class="auth-input-wrap">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 7V5a3 3 0 1 1 6 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="password" id="re_password" name="re_password" placeholder="비밀번호 다시 입력" autocomplete="new-password" required>
        </div>
        <div class="field-hint" id="reHint"></div>
      </div>

      <div class="auth-error"   id="err-msg"></div>
      <div class="auth-success" id="ok-msg"></div>

      <button type="submit" class="auth-submit" id="submitBtn">회원가입</button>

    </form>
  </div>

  <div class="auth-footer">
    이미 계정이 있으신가요? <a href="/login">로그인</a>
  </div>

</div>

<script>
'use strict';

/* 다크 모드 */
document.getElementById('btnTheme').addEventListener('click', () => {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  document.getElementById('iconMoon').toggleAttribute('data-hidden', next === 'dark');
  document.getElementById('iconSun').toggleAttribute('data-hidden',  next === 'light');
  localStorage.setItem('theme', next);
});

/* 비밀번호 강도 */
function pwScore(pw) {
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw) || /[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw) && pw.length >= 10) score++;
  return score;
}

document.getElementById('password').addEventListener('input', function() {
  const pw    = this.value;
  const score = pwScore(pw);
  const bars  = ['bar1','bar2','bar3'];
  const cls   = ['weak','medium','strong'];
  bars.forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'pw-strength-bar';
    if (pw && i < score) el.classList.add(cls[score - 1]);
  });
  const hint = document.getElementById('pwHint');
  if (!pw) { hint.textContent = ''; return; }
  if (score === 1) { hint.textContent = '더 강한 비밀번호를 사용해 보세요'; hint.className = 'field-hint error'; }
  else if (score === 2) { hint.textContent = '적당한 강도예요'; hint.className = 'field-hint'; }
  else { hint.textContent = '강한 비밀번호예요 👍'; hint.className = 'field-hint'; }
});

/* 비밀번호 일치 확인 */
document.getElementById('re_password').addEventListener('input', function() {
  const pw   = document.getElementById('password').value;
  const re   = this.value;
  const hint = document.getElementById('reHint');
  const inp  = this;
  if (!re) { hint.textContent = ''; inp.classList.remove('invalid'); return; }
  if (pw === re) {
    hint.textContent = '비밀번호가 일치해요';
    hint.className   = 'field-hint';
    inp.classList.remove('invalid');
  } else {
    hint.textContent = '비밀번호가 다릅니다';
    hint.className   = 'field-hint error';
    inp.classList.add('invalid');
  }
});

/* 폼 제출 */
document.getElementById('register-form').addEventListener('submit', function(e) {
  e.preventDefault();

  const username    = document.getElementById('username').value;
  const password    = document.getElementById('password').value;
  const re_password = document.getElementById('re_password').value;
  const errEl       = document.getElementById('err-msg');
  const okEl        = document.getElementById('ok-msg');
  const submitBtn   = document.getElementById('submitBtn');

  errEl.classList.remove('visible');
  okEl.classList.remove('visible');

  if (re_password !== password) {
    errEl.textContent = '비밀번호가 다릅니다.';
    errEl.classList.add('visible');
    return;
  }

  submitBtn.disabled    = true;
  submitBtn.textContent = '처리 중…';

  fetch('/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password }),
  }).then(function(res) {
    if (res.status === 200) {
      return res.json().then(function(data) {
        okEl.textContent = data.message || '가입이 완료됐어요! 로그인 페이지로 이동합니다.';
        okEl.classList.add('visible');
        setTimeout(() => window.location.href = '/login', 1200);
      });
    } else {
      errEl.textContent = '이미 존재하는 아이디 입니다.';
      errEl.classList.add('visible');
      submitBtn.disabled    = false;
      submitBtn.textContent = '회원가입';
    }
  }).catch(function() {
    errEl.textContent = '네트워크 오류가 발생했어요. 다시 시도해 주세요.';
    errEl.classList.add('visible');
    submitBtn.disabled    = false;
    submitBtn.textContent = '회원가입';
  });
});
</script>
</body>
</html>
