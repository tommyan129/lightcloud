<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초기 설정 — CloudFiles</title>
<link rel="stylesheet" href="/static/css/lightcloud.css">
<style>
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  padding: 1.5rem;
}
.auth-wrap {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 1.75rem;
}

/* 브랜드 */
.auth-brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .55rem;
}
.auth-brand .logo-mark {
  width: 48px; height: 48px;
  border-radius: 14px;
}
.auth-brand .logo-mark svg { width: 22px; height: 22px; }
.auth-brand h1 {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
  margin: 0;
}
.auth-brand .subtitle {
  font-size: .82rem;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.6;
  margin: 0;
}

/* 경고 배너 */
.admin-notice {
  display: flex;
  align-items: flex-start;
  gap: .6rem;
  background: color-mix(in srgb, #f5a623 10%, transparent);
  border: 1px solid color-mix(in srgb, #f5a623 30%, transparent);
  border-radius: var(--radius);
  padding: .65rem .85rem;
  font-size: .78rem;
  color: color-mix(in srgb, #f5a623 80%, var(--text));
  line-height: 1.5;
}
.admin-notice svg { flex-shrink: 0; margin-top: .05rem; }

/* 카드 */
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* 섹션 구분선 */
.section-divider {
  display: flex;
  align-items: center;
  gap: .6rem;
  margin: .25rem 0;
}
.section-divider span {
  font-size: .7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-dim);
  white-space: nowrap;
}
.section-divider::before,
.section-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* 필드 */
.auth-field {
  display: flex;
  flex-direction: column;
  gap: .35rem;
}
.auth-field label {
  font-size: .78rem;
  font-weight: 600;
  color: var(--text-muted);
}
.auth-input-wrap { position: relative; }
.auth-input-wrap svg {
  position: absolute;
  left: .75rem; top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--text-dim);
}
.auth-input-wrap input {
  width: 100%;
  padding: .55rem .75rem .55rem 2.35rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--text);
  font-size: .88rem;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
  font-family: var(--ff);
}
.auth-input-wrap input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-bg);
}
.auth-input-wrap input.invalid {
  border-color: var(--danger);
  box-shadow: 0 0 0 3px var(--danger-bg);
}
.auth-input-wrap input::placeholder { color: var(--text-dim); }

/* 클라우드 이름 미리보기 */
.cloud-preview {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .4rem .65rem;
  background: var(--primary-bg);
  border-radius: var(--radius);
  font-size: .76rem;
  color: var(--primary);
  font-weight: 500;
  margin-top: .1rem;
}
.cloud-preview svg { flex-shrink: 0; }
.cloud-preview span { font-family: var(--ff-mono); }

.field-hint {
  font-size: .72rem;
  color: var(--text-dim);
  min-height: .9rem;
}
.field-hint.error { color: var(--danger); }

/* 비밀번호 강도 */
.pw-strength { display: flex; gap: 3px; margin-top: .3rem; }
.pw-strength-bar {
  flex: 1; height: 3px; border-radius: 99px;
  background: var(--border);
  transition: background .2s;
}
.pw-strength-bar.weak   { background: var(--danger); }
.pw-strength-bar.medium { background: var(--primary); }
.pw-strength-bar.strong { background: #1e8a44; }

/* 제출 버튼 */
.auth-submit {
  width: 100%;
  padding: .6rem;
  border-radius: var(--radius);
  background: linear-gradient(135deg, #7c6fef, #a259ff);
  color: #fff;
  border: none;
  font-size: .9rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity var(--transition);
  font-family: var(--ff);
  margin-top: .25rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .4rem;
}
.auth-submit:hover { opacity: .88; }
.auth-submit:disabled { opacity: .55; cursor: not-allowed; }

/* 에러/성공 */
.auth-error {
  font-size: .78rem;
  color: var(--danger);
  background: var(--danger-bg);
  border: 1px solid color-mix(in srgb, var(--danger) 25%, transparent);
  border-radius: var(--radius);
  padding: .5rem .75rem;
  display: none;
}
.auth-error.visible { display: block; }
.auth-success {
  font-size: .78rem;
  color: #1e8a44;
  background: color-mix(in srgb, #1e8a44 10%, transparent);
  border: 1px solid color-mix(in srgb, #1e8a44 25%, transparent);
  border-radius: var(--radius);
  padding: .5rem .75rem;
  display: none;
}
.auth-success.visible { display: block; }

/* 다크 토글 */
.auth-theme-btn { position: fixed; top: 1rem; right: 1rem; }
</style>
</head>
<body>

<button class="dark-toggle auth-theme-btn" id="btnTheme" title="Toggle dark mode">
  <svg id="iconMoon" width="15" height="15" viewBox="0 0 16 16" fill="none">
    <path d="M13.5 10A6 6 0 0 1 6 2.5a6 6 0 1 0 7.5 7.5z" fill="currentColor"/>
  </svg>
  <svg id="iconSun" width="15" height="15" viewBox="0 0 16 16" fill="none" data-hidden>
    <circle cx="8" cy="8" r="3" fill="currentColor"/>
    <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </svg>
</button>

<div class="auth-wrap">

  <!-- 브랜드 -->
  <div class="auth-brand">
    <div class="logo-mark">
      <svg width="22" height="22" viewBox="0 0 14 14" fill="none">
        <path d="M7 1C4.2 1 2 3.2 2 6c-1.1 0-2 .9-2 2s.9 2 2 2h10c1.1 0 2-.9 2-2s-.9-2-2-2c0-2.8-2.2-5-5-5z" fill="white"/>
      </svg>
    </div>
    <h1>새로운 시작</h1>
    <p class="subtitle">
      관리자 계정을 설정하고 나만의 클라우드를 시작하세요.<br>
      이 계정은 서버의 모든 권한을 가집니다.
    </p>
  </div>

  <!-- 경고 배너 -->
  <div class="admin-notice">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <path d="M8 2L14.9 14H1.1L8 2z" stroke="#f5a623" stroke-width="1.4" stroke-linejoin="round"/>
      <path d="M8 7v3" stroke="#f5a623" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="8" cy="12" r=".8" fill="#f5a623"/>
    </svg>
    한 번만 나타나는 화면입니다. 관리자 정보를 신중하게 입력하세요.
  </div>

  <!-- 폼 카드 -->
  <div class="auth-card">
    <form id="setup-form" style="display:contents">

      <!-- 클라우드 설정 섹션 -->
      <div class="section-divider"><span>클라우드 설정</span></div>

      <div class="auth-field">
        <label for="cloudName">클라우드 이름</label>
        <div class="auth-input-wrap">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1C4.2 1 2 3.2 2 6c-1.1 0-2 .9-2 2s.9 2 2 2h10c1.1 0 2-.9 2-2s-.9-2-2-2c0-2.8-2.2-5-5-5z" stroke="currentColor" stroke-width="1.3" fill="none"/>
          </svg>
          <input type="text" id="cloudName" name="cloud_name" placeholder="예: My Cloud, 우리 팀 드라이브…" maxlength="30">
        </div>
        <div class="cloud-preview" id="cloudPreview">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
            <path d="M7 1C4.2 1 2 3.2 2 6c-1.1 0-2 .9-2 2s.9 2 2 2h10c1.1 0 2-.9 2-2s-.9-2-2-2c0-2.8-2.2-5-5-5z" fill="currentColor"/>
          </svg>
          <span id="cloudNamePreview">CloudFiles</span>
        </div>
      </div>

      <!-- 관리자 계정 섹션 -->
      <div class="section-divider" style="margin-top:.25rem"><span>관리자 계정</span></div>

      <div class="auth-field">
        <label for="username">사용자 명</label>
        <div class="auth-input-wrap">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="6" r="3" stroke="currentColor" stroke-width="1.4"/>
            <path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="text" id="username" name="username" placeholder="관리자 아이디 입력" autocomplete="username" required>
        </div>
      </div>

      <div class="auth-field">
        <label for="password">비밀번호</label>
        <div class="auth-input-wrap">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 7V5a3 3 0 1 1 6 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="password" id="password" name="password" placeholder="비밀번호 입력" autocomplete="new-password" required>
        </div>
        <div class="pw-strength" id="pwStrength">
          <div class="pw-strength-bar" id="bar1"></div>
          <div class="pw-strength-bar" id="bar2"></div>
          <div class="pw-strength-bar" id="bar3"></div>
        </div>
        <div class="field-hint" id="pwHint"></div>
      </div>

      <div class="auth-field">
        <label for="re_password">비밀번호 재입력</label>
        <div class="auth-input-wrap">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 7V5a3 3 0 1 1 6 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="password" id="re_password" name="re_password" placeholder="비밀번호 다시 입력" autocomplete="new-password" required>
        </div>
        <div class="field-hint" id="reHint"></div>
      </div>

      <div class="auth-error"   id="err-msg"></div>
      <div class="auth-success" id="ok-msg"></div>

      <button type="submit" class="auth-submit" id="submitBtn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1C4.2 1 2 3.2 2 6c-1.1 0-2 .9-2 2s.9 2 2 2h10c1.1 0 2-.9 2-2s-.9-2-2-2c0-2.8-2.2-5-5-5z" fill="white"/>
        </svg>
        클라우드 시작하기
      </button>

    </form>
  </div>

</div>

<script>
'use strict';

/* ── 다크 모드 ── */
document.getElementById('btnTheme').addEventListener('click', () => {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  document.getElementById('iconMoon').toggleAttribute('data-hidden', next === 'dark');
  document.getElementById('iconSun').toggleAttribute('data-hidden',  next === 'light');
});

/* ── 클라우드 이름 미리보기 ── */
document.getElementById('cloudName').addEventListener('input', function() {
  const val = this.value.trim();
  document.getElementById('cloudNamePreview').textContent = val || 'CloudFiles';
});

/* ── 비밀번호 강도 ── */
function pwScore(pw) {
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw) || /[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw) && pw.length >= 10) score++;
  return score;
}

document.getElementById('password').addEventListener('input', function() {
  const pw    = this.value;
  const score = pwScore(pw);
  const bars  = ['bar1', 'bar2', 'bar3'];
  const cls   = ['weak', 'medium', 'strong'];
  bars.forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'pw-strength-bar';
    if (pw && i < score) el.classList.add(cls[score - 1]);
  });
  const hint = document.getElementById('pwHint');
  if (!pw) { hint.textContent = ''; return; }
  if (score === 1) { hint.textContent = '더 강한 비밀번호를 사용해 보세요'; hint.className = 'field-hint error'; }
  else if (score === 2) { hint.textContent = '적당한 강도예요'; hint.className = 'field-hint'; }
  else { hint.textContent = '강한 비밀번호예요 👍'; hint.className = 'field-hint'; }
});

/* ── 비밀번호 일치 ── */
document.getElementById('re_password').addEventListener('input', function() {
  const pw   = document.getElementById('password').value;
  const re   = this.value;
  const hint = document.getElementById('reHint');
  if (!re) { hint.textContent = ''; this.classList.remove('invalid'); return; }
  if (pw === re) {
    hint.textContent = '비밀번호가 일치해요';
    hint.className   = 'field-hint';
    this.classList.remove('invalid');
  } else {
    hint.textContent = '비밀번호가 다릅니다';
    hint.className   = 'field-hint error';
    this.classList.add('invalid');
  }
});

/* ── 폼 제출 ── */
document.getElementById('setup-form').addEventListener('submit', function(e) {
  e.preventDefault();

  const cloudName  = document.getElementById('cloudName').value.trim() || 'CloudFiles';
  const username   = document.getElementById('username').value;
  const password   = document.getElementById('password').value;
  const re_password = document.getElementById('re_password').value;
  const errEl      = document.getElementById('err-msg');
  const okEl       = document.getElementById('ok-msg');
  const submitBtn  = document.getElementById('submitBtn');

  errEl.classList.remove('visible');
  okEl.classList.remove('visible');

  if (re_password !== password) {
    errEl.textContent = '비밀번호가 다릅니다.';
    errEl.classList.add('visible');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerHTML = '설정 중…';

  // TODO: fetch 연결
  // fetch('/setup', {
  //   method: 'POST',
  //   headers: { 'Content-Type': 'application/json' },
  //   body: JSON.stringify({ cloud_name: cloudName, username, password }),
  // }).then(function(res) {
  //   if (res.status === 200) {
  //     okEl.textContent = '설정이 완료됐어요! 로그인 페이지로 이동합니다.';
  //     okEl.classList.add('visible');
  //     setTimeout(() => window.location.href = '/login', 1200);
  //   } else {
  //     errEl.textContent = '설정에 실패했어요. 다시 시도해 주세요.';
  //     errEl.classList.add('visible');
  //     submitBtn.disabled = false;
  //     submitBtn.textContent = '클라우드 시작하기';
  //   }
  // }).catch(function() {
  //   errEl.textContent = '네트워크 오류가 발생했어요.';
  //   errEl.classList.add('visible');
  //   submitBtn.disabled = false;
  //   submitBtn.textContent = '클라우드 시작하기';
  // });
});
</script>
</body>
</html>
