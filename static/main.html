  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

">\n      <input type=\"search\" id=\"searchInput\" placeholder=\"Search files…\" aria-label=\"Search\">\n\n      <!-- view toggle -->\n      <div class=\"view-toggle\">\n        <button class=\"active\" id=\"btnList\" title=\"List view\" onclick=\"setView('list')\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M1 3h12M1 7h12M1 11h12\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <button id=\"btnGrid\" title=\"Grid view\" onclick=\"setView('grid')\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><rect x=\"1\" y=\"1\" width=\"5\" height=\"5\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.5\"><\u002Frect><rect x=\"8\" y=\"1\" width=\"5\" height=\"5\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.5\"><\u002Frect><rect x=\"1\" y=\"8\" width=\"5\" height=\"5\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.5\"><\u002Frect><rect x=\"8\" y=\"8\" width=\"5\" height=\"5\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.5\"><\u002Frect><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- dark mode -->\n      <button class=\"dark-toggle\" id=\"themeBtn\" title=\"Toggle dark mode\" onclick=\"toggleTheme()\">\n        <svg id=\"iconMoon\" width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\">\n          <path d=\"M13.5 10A6 6 0 0 1 6 2.5a6 6 0 1 0 7.5 7.5z\" fill=\"currentColor\"><\u002Fpath>\n        <\u002Fsvg>\n        <svg id=\"iconSun\" width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" style=\"display:none\">\n          <circle cx=\"8\" cy=\"8\" r=\"3\" fill=\"currentColor\"><\u002Fcircle>\n          <path d=\"M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fbutton>\n\n      <!-- share selected -->\n      <button class=\"delete-btn outline\" id=\"shareBtn\" data-hidden=\"\" onclick=\"openShareModal(null)\" style=\"font-size:.82rem;padding:.4rem .9rem;margin:0\">\n        <svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" fill=\"none\" style=\"margin-right:4px;vertical-align:-2px\">\n          <circle cx=\"11\" cy=\"3\" r=\"2\" stroke=\"currentColor\" stroke-width=\"1.4\"><\u002Fcircle>\n          <circle cx=\"3\" cy=\"7\" r=\"2\" stroke=\"currentColor\" stroke-width=\"1.4\"><\u002Fcircle>\n          <circle cx=\"11\" cy=\"11\" r=\"2\" stroke=\"currentColor\" stroke-width=\"1.4\"><\u002Fcircle>\n          <path d=\"M5 6l4-2M5 8l4 2\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fsvg>공유\n      <\u002Fbutton>\n      <!-- bulk delete -->\n      <button class=\"delete-btn secondary\" id=\"deleteBtn\" data-hidden=\"\" style=\"color:#f2724a;border-color:#f2724a;font-size:.82rem;padding:.4rem .9rem;margin:0\" onclick=\"deleteSelected()\">\n        <svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" fill=\"none\" style=\"margin-right:4px;vertical-align:-2px\">\n          <path d=\"M2 4h10M5 4V2h4v2M4 4l.8 8h4.4l.8-8\" stroke=\"#f2724a\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n        삭제 <span id=\"deleteCount\">0<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- filter chips -->\n    <div class=\"filter-bar\">\n      <span>Filter:<\u002Fspan>\n      <div class=\"chip active\" data-mime=\"\">All<\u002Fdiv>\n      <div class=\"chip\" data-mime=\"pdf\">PDF<\u002Fdiv>\n      <div class=\"chip\" data-mime=\"mp4\">Video<\u002Fdiv>\n      <div class=\"chip\" data-mime=\"xls\">Excel<\u002Fdiv>\n      <div class=\"chip\" data-mime=\"fig\">Figma<\u002Fdiv>\n      <div class=\"chip\" data-mime=\"zip\">ZIP<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- list view -->\n    <div class=\"table-wrap\" id=\"listView\">\n      <table>\n        <thead>\n          <tr>\n            <th style=\"width:32px\"><input type=\"checkbox\" id=\"selectAll\"><\u002Fth>\n            <th data-sort=\"name\">Name <span class=\"sort-arrow\"><\u002Fspan><\u002Fth>\n            <th data-sort=\"size\">Size <span class=\"sort-arrow\"><\u002Fspan><\u002Fth>\n            <th data-sort=\"mime\">Type <span class=\"sort-arrow\"><\u002Fspan><\u002Fth>\n            <th data-sort=\"uploaded\">Uploaded <span class=\"sort-arrow\"><\u002Fspan><\u002Fth>\n            <th>Actions<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody id=\"fileTableBody\"><\u002Ftbody>\n      <\u002Ftable>\n      <div id=\"emptyList\" class=\"empty\" data-hidden=\"\">No files found<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- grid view -->\n    <div class=\"grid-wrap\" id=\"gridView\" data-hidden=\"\">\n      <div class=\"file-grid\" id=\"fileGrid\"><\u002Fdiv>\n      <div id=\"emptyGrid\" class=\"empty\" data-hidden=\"\">No files found<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<!-- ── Upload Modal ── -->\n<div class=\"modal-backdrop\" id=\"uploadModal\" data-hidden=\"\">\n  <div class=\"modal\" style=\"max-width:480px\">\n    <button class=\"modal-close\" onclick=\"closeModal('uploadModal')\">✕<\u002Fbutton>\n    <h4>파일 업로드<\u002Fh4>\n    <div class=\"drop-zone\" id=\"dropZone\" onclick=\"document.getElementById('fileInput').click()\">\n      <svg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\" fill=\"none\"><path d=\"M20 8v16M12 18l8-10 8 10M6 28h28\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <p>파일을 드래그하거나 클릭해서 선택<\u002Fp>\n      <small>모든 파일 형식 지원 · 최대 500MB<\u002Fsmall>\n    <\u002Fdiv>\n    <input type=\"file\" id=\"fileInput\" multiple=\"\" style=\"display:none\" onchange=\"handleFileSelect(this.files)\">\n    <div class=\"file-list-preview\" id=\"uploadPreview\"><\u002Fdiv>\n    <div class=\"modal-footer\">\n      <button class=\"secondary outline\" onclick=\"closeModal('uploadModal')\">취소<\u002Fbutton>\n      <button id=\"uploadConfirmBtn\" onclick=\"confirmUpload()\">업로드<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ── Share Modal ── -->\n<div class=\"modal-backdrop\" id=\"shareModal\" data-hidden=\"\">\n  <div class=\"modal\">\n    <button class=\"modal-close\" onclick=\"closeModal('shareModal')\">✕<\u002Fbutton>\n    <h4>공유 링크<\u002Fh4>\n    <p id=\"shareFileName\" style=\"font-size:.85rem;color:var(--pico-muted-color);margin:-.5rem 0 .75rem\"><\u002Fp>\n    <div class=\"share-link-wrap\">\n      <input type=\"text\" id=\"shareLinkInput\" readonly=\"\" value=\"\">\n      <button onclick=\"copyShareLink()\">링크 복사<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"copyToast\" style=\"font-size:.78rem;color:var(--pico-primary);margin-top:.4rem;display:none\">✓ 클립보드에 복사됐어요<\u002Fdiv>\n    <div class=\"share-perms\">\n      <label>접근 권한<\u002Flabel>\n      <div class=\"perm-row\">\n        <button class=\"perm-opt outline active-perm\" data-perm=\"view\" onclick=\"setPerm(this)\">👁 보기<\u002Fbutton>\n        <button class=\"perm-opt outline\" data-perm=\"comment\" onclick=\"setPerm(this)\">💬 댓글<\u002Fbutton>\n        <button class=\"perm-opt outline\" data-perm=\"edit\" onclick=\"setPerm(this)\">✏️ 편집<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-footer\">\n      <button class=\"secondary outline\" onclick=\"closeModal('shareModal')\">닫기<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ── Permission Modal ── -->\n<div class=\"modal-backdrop\" id=\"permModal\" data-hidden=\"\">\n  <div class=\"modal\">\n    <button class=\"modal-close\" onclick=\"closeModal('permModal')\">✕<\u002Fbutton>\n    <h4 id=\"permModalTitle\">권한 수정<\u002Fh4>\n    <p id=\"permFileName\" style=\"font-size:.85rem;color:var(--pico-muted-color);margin:-.5rem 0 1rem\"><\u002Fp>\n    <div class=\"perm-field\" style=\"margin-bottom:.75rem\">\n      <label>접근 레벨<\u002Flabel>\n      <select id=\"permLevel\">\n        <option value=\"private\">🔒 비공개 (본인만)<\u002Foption>\n        <option value=\"org\">🏢 조직 내 공유<\u002Foption>\n        <option value=\"public\">🌐 공개 링크<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <div class=\"perm-field\" id=\"ownerField\" data-hidden=\"\">\n      <label>소유자 이메일<\u002Flabel>\n      <input type=\"email\" id=\"ownerEmail\" placeholder=\"example@company.com\">\n    <\u002Fdiv>\n    <div class=\"modal-footer\">\n      <button class=\"secondary outline\" onclick=\"closeModal('permModal')\">취소<\u002Fbutton>\n      <button onclick=\"savePermission()\">저장<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nconst EXT = {\n  pdf: { color:'#f2724a', label:'PDF' },\n  fig: { color:'#a259ff', label:'FIG' },\n  mp4: { color:'#2bbfa4', label:'MP4' },\n  xls: { color:'#1e8a44', label:'XLS' },\n  yml: { color:'#f5a623', label:'YML' },\n  sql: { color:'#3b82f6', label:'SQL' },\n  doc: { color:'#2563eb', label:'DOC' },\n  zip: { color:'#6b7280', label:'ZIP' },\n};\n\nlet files = [\n  { id:1, name:'Brand Guidelines.pdf',  size:'4.2 MB',  sizeNum:4200,   mime:'pdf', uploaded:'2026-04-22', folder:'f1' },\n  { id:2, name:'Hero Banner.figma',      size:'12.8 MB', sizeNum:12800,  mime:'fig', uploaded:'2026-04-20', folder:'f1' },\n  { id:3, name:'Campaign Video.mp4',     size:'238 MB',  sizeNum:238000, mime:'mp4', uploaded:'2026-04-18', folder:'f2' },\n  { id:4, name:'Q2 Report.xlsx',         size:'1.1 MB',  sizeNum:1100,   mime:'xls', uploaded:'2026-04-15', folder:'f2' },\n  { id:5, name:'API Spec v3.yaml',       size:'88 KB',   sizeNum:88,     mime:'yml', uploaded:'2026-04-10', folder:'f3' },\n  { id:6, name:'Database Schema.sql',    size:'220 KB',  sizeNum:220,    mime:'sql', uploaded:'2026-04-08', folder:'f3' },\n  { id:7, name:'NDA Template.docx',      size:'340 KB',  sizeNum:340,    mime:'doc', uploaded:'2026-03-30', folder:'f4' },\n  { id:8, name:'Product Photos.zip',     size:'91 MB',   sizeNum:91000,  mime:'zip', uploaded:'2026-03-22', folder:'f1' },\n];\n\nlet state = {\n  search: '',\n  folder: '',\n  mime: '',\n  sortKey: 'uploaded',\n  sortDir: 'desc',\n  view: 'list',\n  selected: new Set(),\n  theme: 'light',\n};\n\n/* ── theme ── */\nfunction toggleTheme() {\n  state.theme = state.theme === 'light' ? 'dark' : 'light';\n  document.documentElement.setAttribute('data-theme', state.theme);\n  document.getElementById('iconMoon').style.display = state.theme === 'light' ? '' : 'none';\n  document.getElementById('iconSun').style.display  = state.theme === 'dark'  ? '' : 'none';\n}\n\n/* ── view toggle ── */\nfunction setView(v) {\n  state.view = v;\n  document.getElementById('listView').toggleAttribute('data-hidden', v !== 'list');\n  document.getElementById('gridView').toggleAttribute('data-hidden', v !== 'grid');\n  document.getElementById('btnList').classList.toggle('active', v === 'list');\n  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');\n}\n\n/* ── sort ── */\nfunction toggleSort(key) {\n  if (state.sortKey === key) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';\n  else { state.sortKey = key; state.sortDir = 'asc'; }\n  render();\n}\n\n/* ── filter + sort ── */\nfunction getFiltered() {\n  return files\n    .filter(f => {\n      if (state.folder && f.folder !== state.folder) return false;\n      if (state.mime   && f.mime   !== state.mime)   return false;\n      if (state.search && !f.name.toLowerCase().includes(state.search.toLowerCase())) return false;\n      return true;\n    })\n    .sort((a, b) => {\n      const k = state.sortKey === 'size' ? 'sizeNum' : state.sortKey;\n      const v = a[k] < b[k] ? -1 : a[k] > b[k] ? 1 : 0;\n      return state.sortDir === 'asc' ? v : -v;\n    });\n}\n\n/* ── ext icon SVG ── */\nfunction extIconSVG(ext) {\n  const c = (EXT[ext]||{color:'#888'}).color;\n  const label = (EXT[ext]||{label:ext.toUpperCase()}).label;\n  return `<div class=\"ext-icon\" style=\"color:${c};border-color:${c}33;background:${c}11\">\n    <svg width=\"14\" height=\"16\" viewBox=\"0 0 14 16\" fill=\"none\">\n      <path d=\"M1 1h9l3 3v11H1z\" fill=\"${c}22\" stroke=\"${c}\" stroke-width=\"1.2\" stroke-linejoin=\"round\"/>\n      <path d=\"M10 1l3 3h-3z\" fill=\"${c}\" opacity=\".4\"/>\n    <\u002Fsvg>\n    <span>${label}<\u002Fspan>\n  <\u002Fdiv>`;\n}\n\n/* ── selection ── */\nfunction toggleSelect(id) {\n  state.selected.has(id) ? state.selected.delete(id) : state.selected.add(id);\n  updateDeleteBtn();\n  render();\n}\n\nfunction updateDeleteBtn() {\n  const btn = document.getElementById('deleteBtn');\n  const n   = state.selected.size;\n  btn.toggleAttribute('data-hidden', n === 0);\n  document.getElementById('deleteCount').textContent = n;\n}\n\nfunction deleteSelected() {\n  files = files.filter(f => !state.selected.has(f.id));\n  state.selected.clear();\n  updateDeleteBtn();\n  render();\n}\n\nfunction deleteOne(id) {\n  files = files.filter(f => f.id !== id);\n  state.selected.delete(id);\n  updateDeleteBtn();\n  render();\n}\n\n/* ── render ── */\nfunction render() {\n  const filtered = getFiltered();\n\n  // update sort arrows\n  document.querySelectorAll('thead th[data-sort]').forEach(th => {\n    const arrow = th.querySelector('.sort-arrow');\n    if (arrow) arrow.textContent = th.dataset.sort === state.sortKey ? (state.sortDir === 'asc' ? ' ↑' : ' ↓') : '';\n  });\n\n  // list\n  const tbody = document.getElementById('fileTableBody');\n  tbody.innerHTML = filtered.map(f => `\n    <tr>\n      <td><input type=\"checkbox\" ${state.selected.has(f.id)?'checked':''} onchange=\"toggleSelect(${f.id})\"><\u002Ftd>\n      <td>\n        <div class=\"file-cell\">\n          ${extIconSVG(f.mime)}\n          <span style=\"font-weight:500\">${f.name}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Ftd>\n      <td><span class=\"mono\">${f.size}<\u002Fspan><\u002Ftd>\n      <td><span class=\"badge\" style=\"background:${(EXT[f.mime]||{color:'#888'}).color}22;color:${(EXT[f.mime]||{color:'#888'}).color}\">${f.mime.toUpperCase()}<\u002Fspan><\u002Ftd>\n      <td><span class=\"mono\">${f.uploaded}<\u002Fspan><\u002Ftd>\n      <td>\n        <div class=\"row-actions\">\n          <button class=\"btn-dl\" title=\"다운로드\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M7 1v8M4 7l3 3 3-3M1 11h12\" stroke=\"var(--pico-primary)\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\u002Fsvg><\u002Fbutton>\n          <button class=\"btn-dl\" title=\"공유\" style=\"background:color-mix(in srgb,var(--pico-primary) 12%,transparent)\" onclick=\"openShareModal(${f.id})\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" fill=\"none\"><circle cx=\"11\" cy=\"3\" r=\"1.8\" stroke=\"var(--pico-primary)\" stroke-width=\"1.4\"/><circle cx=\"3\" cy=\"7\" r=\"1.8\" stroke=\"var(--pico-primary)\" stroke-width=\"1.4\"/><circle cx=\"11\" cy=\"11\" r=\"1.8\" stroke=\"var(--pico-primary)\" stroke-width=\"1.4\"/><path d=\"M4.7 6l4-2M4.7 8l4 2\" stroke=\"var(--pico-primary)\" stroke-width=\"1.4\" stroke-linecap=\"round\"/><\u002Fsvg><\u002Fbutton>\n          <button class=\"btn-del\" title=\"삭제\" onclick=\"deleteOne(${f.id})\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M2 4h10M5 4V2h4v2M4 4l.8 8h4.4l.8-8\" stroke=\"#f2724a\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\u002Fsvg><\u002Fbutton>\n          <div class=\"dropdown-wrap\">\n            <button class=\"more-btn\" title=\"더보기\" onclick=\"toggleDropdown(${f.id})\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><circle cx=\"7\" cy=\"3\" r=\"1.2\" fill=\"currentColor\"/><circle cx=\"7\" cy=\"7\" r=\"1.2\" fill=\"currentColor\"/><circle cx=\"7\" cy=\"11\" r=\"1.2\" fill=\"currentColor\"/><\u002Fsvg>\n            <\u002Fbutton>\n            <div class=\"dropdown-menu\" id=\"dd-${f.id}\" data-hidden>\n              <button onclick=\"openPermModal(${f.id},'perm');closeAllDropdowns()\">\n                <svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" fill=\"none\"><rect x=\"3\" y=\"6\" width=\"8\" height=\"7\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.4\"/><path d=\"M5 6V4a2 2 0 1 1 4 0v2\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\"/><\u002Fsvg>\n                권한 수정\n              <\u002Fbutton>\n              <button onclick=\"openPermModal(${f.id},'owner');closeAllDropdowns()\">\n                <svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" fill=\"none\"><circle cx=\"7\" cy=\"4\" r=\"2.5\" stroke=\"currentColor\" stroke-width=\"1.4\"/><path d=\"M1 13c0-3.3 2.7-6 6-6s6 2.7 6 6\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\"/><\u002Fsvg>\n                소유자 수정\n              <\u002Fbutton>\n              <div class=\"divider\"><\u002Fdiv>\n              <button onclick=\"deleteOne(${f.id});closeAllDropdowns()\" style=\"color:#f2724a\">\n                <svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M2 4h10M5 4V2h4v2M4 4l.8 8h4.4l.8-8\" stroke=\"#f2724a\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\u002Fsvg>\n                삭제\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Ftd>\n    <\u002Ftr>\n  `).join('');\n\n  document.getElementById('emptyList').toggleAttribute('data-hidden', filtered.length > 0);\n\n  // grid\n  const grid = document.getElementById('fileGrid');\n  grid.innerHTML = filtered.map(f => `\n    <div class=\"grid-card\">\n      ${extIconSVG(f.mime)}\n      <div class=\"fname\">${f.name}<\u002Fdiv>\n      <div class=\"fsize\">${f.size}<\u002Fdiv>\n      <div class=\"row-actions\">\n        <button class=\"btn-dl\" title=\"다운로드\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M7 1v8M4 7l3 3 3-3M1 11h12\" stroke=\"var(--pico-primary)\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\u002Fsvg><\u002Fbutton>\n        <button class=\"btn-dl\" title=\"공유\" style=\"background:color-mix(in srgb,var(--pico-primary) 12%,transparent)\" onclick=\"openShareModal(${f.id})\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 14 14\" fill=\"none\"><circle cx=\"11\" cy=\"3\" r=\"1.8\" stroke=\"var(--pico-primary)\" stroke-width=\"1.4\"/><circle cx=\"3\" cy=\"7\" r=\"1.8\" stroke=\"var(--pico-primary)\" stroke-width=\"1.4\"/><circle cx=\"11\" cy=\"11\" r=\"1.8\" stroke=\"var(--pico-primary)\" stroke-width=\"1.4\"/><path d=\"M4.7 6l4-2M4.7 8l4 2\" stroke=\"var(--pico-primary)\" stroke-width=\"1.4\" stroke-linecap=\"round\"/><\u002Fsvg><\u002Fbutton>\n        <button class=\"btn-del\" title=\"삭제\" onclick=\"deleteOne(${f.id})\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M2 4h10M5 4V2h4v2M4 4l.8 8h4.4l.8-8\" stroke=\"#f2724a\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\u002Fsvg><\u002Fbutton>\n        <div class=\"dropdown-wrap\">\n          <button class=\"more-btn\" style=\"width:26px;height:26px\" onclick=\"toggleDropdown('g${f.id}')\">\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" fill=\"none\"><circle cx=\"7\" cy=\"3\" r=\"1.2\" fill=\"currentColor\"/><circle cx=\"7\" cy=\"7\" r=\"1.2\" fill=\"currentColor\"/><circle cx=\"7\" cy=\"11\" r=\"1.2\" fill=\"currentColor\"/><\u002Fsvg>\n          <\u002Fbutton>\n          <div class=\"dropdown-menu\" id=\"dd-g${f.id}\" data-hidden style=\"right:auto;left:0\">\n            <button onclick=\"openPermModal(${f.id},'perm');closeAllDropdowns()\">권한 수정<\u002Fbutton>\n            <button onclick=\"openPermModal(${f.id},'owner');closeAllDropdowns()\">소유자 수정<\u002Fbutton>\n            <div class=\"divider\"><\u002Fdiv>\n            <button onclick=\"deleteOne(${f.id});closeAllDropdowns()\" style=\"color:#f2724a\">삭제<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n\n  document.getElementById('emptyGrid').toggleAttribute('data-hidden', filtered.length > 0);\n\n  // select-all checkbox\n  const allCb = document.getElementById('selectAll');\n  if (allCb) {\n    allCb.checked = filtered.length > 0 && filtered.every(f => state.selected.has(f.id));\n    allCb.indeterminate = !allCb.checked && filtered.some(f => state.selected.has(f.id));\n  }\n}\n\n/* ── events ── */\ndocument.getElementById('searchInput').addEventListener('input', e => {\n  state.search = e.target.value; render();\n});\n\ndocument.getElementById('selectAll').addEventListener('change', e => {\n  getFiltered().forEach(f => e.target.checked ? state.selected.add(f.id) : state.selected.delete(f.id));\n  updateDeleteBtn(); render();\n});\n\ndocument.querySelectorAll('thead th[data-sort]').forEach(th =>\n  th.addEventListener('click', () => toggleSort(th.dataset.sort))\n);\n\ndocument.querySelectorAll('.chip').forEach(chip =>\n  chip.addEventListener('click', () => {\n    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));\n    chip.classList.add('active');\n    state.mime = chip.dataset.mime;\n    render();\n  })\n);\n\ndocument.querySelectorAll('.folder-link').forEach(link =>\n  link.addEventListener('click', e => {\n    e.preventDefault();\n    document.querySelectorAll('.folder-link').forEach(l => l.classList.remove('active'));\n    link.classList.add('active');\n    state.folder = link.dataset.folder;\n    render();\n  })\n);\n\nrender();\n\n/* ── modal helpers ── */\nfunction openModal(id) { document.getElementById(id).removeAttribute('data-hidden'); }\nfunction closeModal(id) { document.getElementById(id).setAttribute('data-hidden',''); }\ndocument.querySelectorAll('.modal-backdrop').forEach(b => b.addEventListener('click', e => { if (e.target === b) b.setAttribute('data-hidden',''); }));\n\n/* ── upload modal ── */\nlet pendingFiles = [];\n\ndocument.querySelector('.upload-wrap button').addEventListener('click', () => {\n  pendingFiles = [];\n  document.getElementById('uploadPreview').innerHTML = '';\n  document.getElementById('fileInput').value = '';\n  openModal('uploadModal');\n});\n\nconst dropZone = document.getElementById('dropZone');\ndropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });\ndropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));\ndropZone.addEventListener('drop', e => {\n  e.preventDefault(); dropZone.classList.remove('dragover');\n  handleFileSelect(e.dataTransfer.files);\n});\n\nfunction handleFileSelect(fileList) {\n  pendingFiles = [...pendingFiles, ...Array.from(fileList)];\n  const preview = document.getElementById('uploadPreview');\n  preview.innerHTML = pendingFiles.map((f,i) => `\n    <div class=\"fitem\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 16\" fill=\"none\"><path d=\"M1 1h9l3 3v11H1z\" fill=\"var(--pico-primary-background)\" stroke=\"var(--pico-primary)\" stroke-width=\"1.2\" stroke-linejoin=\"round\"/><\u002Fsvg>\n      <span class=\"fname2\">${f.name}<\u002Fspan>\n      <span class=\"fsize2\">${formatBytes(f.size)}<\u002Fspan>\n      <button onclick=\"removePending(${i})\" style=\"background:none;border:none;cursor:pointer;padding:0;color:var(--pico-muted-color);font-size:.9rem;line-height:1\">✕<\u002Fbutton>\n    <\u002Fdiv>\n  `).join('');\n}\n\nfunction removePending(i) {\n  pendingFiles.splice(i, 1);\n  handleFileSelect([]);\n  pendingFiles = pendingFiles.filter((_,idx) => idx < pendingFiles.length);\n  // re-render from current pendingFiles\n  const preview = document.getElementById('uploadPreview');\n  preview.innerHTML = pendingFiles.map((f,i2) => `\n    <div class=\"fitem\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 16\" fill=\"none\"><path d=\"M1 1h9l3 3v11H1z\" fill=\"var(--pico-primary-background)\" stroke=\"var(--pico-primary)\" stroke-width=\"1.2\" stroke-linejoin=\"round\"/><\u002Fsvg>\n      <span class=\"fname2\">${f.name}<\u002Fspan>\n      <span class=\"fsize2\">${formatBytes(f.size)}<\u002Fspan>\n      <button onclick=\"removePending(${i2})\" style=\"background:none;border:none;cursor:pointer;padding:0;color:var(--pico-muted-color);font-size:.9rem;line-height:1\">✕<\u002Fbutton>\n    <\u002Fdiv>\n  `).join('');\n}\n\nfunction formatBytes(b) {\n  if (b < 1024) return b + ' B';\n  if (b < 1024*1024) return (b/1024).toFixed(0) + ' KB';\n  return (b/(1024*1024)).toFixed(1) + ' MB';\n}\n\nfunction confirmUpload() {\n  if (!pendingFiles.length) return;\n  const extMap = { pdf:'pdf', figma:'fig', mp4:'mp4', xlsx:'xls', yaml:'yml', yml:'yml', sql:'sql', docx:'doc', doc:'doc', zip:'zip' };\n  pendingFiles.forEach(f => {\n    const ext = f.name.split('.').pop().toLowerCase();\n    files.unshift({\n      id: Date.now() + Math.random(),\n      name: f.name,\n      size: formatBytes(f.size),\n      sizeNum: f.size / 1024,\n      mime: extMap[ext] || ext,\n      uploaded: new Date().toISOString().slice(0,10),\n      folder: state.folder || 'f1',\n    });\n  });\n  pendingFiles = [];\n  closeModal('uploadModal');\n  render();\n}\n\n/* ── share modal ── */\nfunction openShareModal(fileId) {\n  const file = fileId ? files.find(f => f.id === fileId) : null;\n  const names = fileId ? file?.name : `선택된 ${state.selected.size}개 파일`;\n  document.getElementById('shareFileName').textContent = names || '';\n  const link = `https://cloudfiles.app/share/${Math.random().toString(36).slice(2,10)}`;\n  document.getElementById('shareLinkInput').value = link;\n  document.getElementById('copyToast').style.display = 'none';\n  document.querySelectorAll('.perm-opt').forEach(b => b.classList.remove('active-perm'));\n  document.querySelector('.perm-opt[data-perm=\"view\"]').classList.add('active-perm');\n  openModal('shareModal');\n}\n\nfunction copyShareLink() {\n  const val = document.getElementById('shareLinkInput').value;\n  navigator.clipboard?.writeText(val).catch(() => {});\n  const toast = document.getElementById('copyToast');\n  toast.style.display = 'block';\n  setTimeout(() => toast.style.display = 'none', 2500);\n}\n\nfunction setPerm(btn) {\n  document.querySelectorAll('.perm-opt').forEach(b => {\n    b.classList.remove('active-perm');\n    b.style.background = '';\n    b.style.color = '';\n  });\n  btn.classList.add('active-perm');\n  btn.style.background = 'var(--pico-primary)';\n  btn.style.color = 'var(--pico-primary-inverse)';\n}\n\n/* ── permission / owner modal ── */\nlet permModalMode = 'perm'; // 'perm' | 'owner'\nfunction openPermModal(fileId, mode) {\n  permModalMode = mode;\n  const file = files.find(f => f.id === fileId);\n  document.getElementById('permModalTitle').textContent = mode === 'owner' ? '소유자 수정' : '권한 수정';\n  document.getElementById('permFileName').textContent = file?.name || '';\n  document.getElementById('ownerField').toggleAttribute('data-hidden', mode !== 'owner');\n  openModal('permModal');\n}\n\nfunction savePermission() {\n  closeModal('permModal');\n}\n\n/* ── ... dropdown ── */\nlet openDropdownId = null;\nfunction toggleDropdown(id) {\n  if (openDropdownId === id) { closeAllDropdowns(); return; }\n  closeAllDropdowns();\n  openDropdownId = id;\n  const el = document.getElementById('dd-' + id);\n  if (el) el.removeAttribute('data-hidden');\n}\nfunction closeAllDropdowns() {\n  document.querySelectorAll('.dropdown-menu').forEach(m => m.setAttribute('data-hidden',''));\n  openDropdownId = null;\n}\ndocument.addEventListener('click', e => {\n  if (!e.target.closest('.dropdown-wrap')) closeAllDropdowns();\n});\n\n/* ── update delete + share btn visibility ── */\nfunction updateDeleteBtn() {\n  const n = state.selected.size;\n  document.getElementById('deleteBtn').toggleAttribute('data-hidden', n === 0);\n  document.getElementById('shareBtn').toggleAttribute('data-hidden', n === 0);\n  document.getElementById('deleteCount').textContent = n;\n}\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
