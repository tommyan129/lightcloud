<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — CloudFiles</title>
<link rel="stylesheet" href="/static/css/lightcloud.css">
<style>
/* ── 로그인 전용 ── */
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  padding: 1.5rem;
}

.auth-wrap {
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  gap: 1.75rem;
}

/* 브랜드 */
.auth-brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .65rem;
}
.auth-brand .logo-mark {
  width: 44px; height: 44px;
  border-radius: 12px;
}
.auth-brand .logo-mark svg { width: 20px; height: 20px; }
.auth-brand h1 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
  margin: 0;
}
.auth-brand p {
  font-size: .82rem;
  color: var(--text-muted);
  margin: 0;
  text-align: center;
}

/* 카드 */
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* 폼 필드 */
.auth-field {
  display: flex;
  flex-direction: column;
  gap: .35rem;
}
.auth-field label {
  font-size: .78rem;
  font-weight: 600;
  color: var(--text-muted);
}
.auth-input-wrap { position: relative; }
.auth-input-wrap svg {
  position: absolute;
  left: .75rem; top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--text-dim);
}
.auth-input-wrap input {
  width: 100%;
  padding: .55rem .75rem .55rem 2.35rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--text);
  font-size: .88rem;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
  font-family: var(--ff);
}
.auth-input-wrap input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-bg);
}
.auth-input-wrap input::placeholder { color: var(--text-dim); }

/* 제출 버튼 */
.auth-submit {
  width: 100%;
  padding: .6rem;
  border-radius: var(--radius);
  background: linear-gradient(135deg, #7c6fef, #a259ff);
  color: #fff;
  border: none;
  font-size: .9rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity var(--transition);
  font-family: var(--ff);
  margin-top: .25rem;
}
.auth-submit:hover { opacity: .88; }
.auth-submit:disabled { opacity: .55; cursor: not-allowed; }

/* 에러 */
.auth-error {
  font-size: .78rem;
  color: var(--danger);
  background: var(--danger-bg);
  border: 1px solid color-mix(in srgb, var(--danger) 25%, transparent);
  border-radius: var(--radius);
  padding: .5rem .75rem;
  min-height: 0;
  display: none;
}
.auth-error.visible { display: block; }

/* 하단 링크 */
.auth-footer {
  text-align: center;
  font-size: .82rem;
  color: var(--text-muted);
}
.auth-footer a {
  color: var(--primary);
  font-weight: 500;
  text-decoration: none;
  transition: opacity var(--transition);
}
.auth-footer a:hover { opacity: .75; }

/* 다크 토글 */
.auth-theme-btn {
  position: fixed;
  top: 1rem; right: 1rem;
}
</style>
</head>
<body>

<button class="dark-toggle auth-theme-btn" id="btnTheme" title="Toggle dark mode">
  <svg id="iconMoon" width="15" height="15" viewBox="0 0 16 16" fill="none">
    <path d="M13.5 10A6 6 0 0 1 6 2.5a6 6 0 1 0 7.5 7.5z" fill="currentColor"/>
  </svg>
  <svg id="iconSun" width="15" height="15" viewBox="0 0 16 16" fill="none" data-hidden>
    <circle cx="8" cy="8" r="3" fill="currentColor"/>
    <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </svg>
</button>

<div class="auth-wrap">

  <div class="auth-brand">
    <div class="logo-mark">
      <svg width="20" height="20" viewBox="0 0 14 14" fill="none">
        <path d="M7 1C4.2 1 2 3.2 2 6c-1.1 0-2 .9-2 2s.9 2 2 2h10c1.1 0 2-.9 2-2s-.9-2-2-2c0-2.8-2.2-5-5-5z" fill="white"/>
      </svg>
    </div>
    <h1>CloudFiles</h1>
    <p>계정에 로그인하세요</p>
  </div>

  <div class="auth-card">
    <form id="login-form" method="POST" action="/login" style="display:contents">

      <div class="auth-field">
        <label for="username">사용자 명</label>
        <div class="auth-input-wrap">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="6" r="3" stroke="currentColor" stroke-width="1.4"/>
            <path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="text" id="username" name="username" placeholder="아이디 입력" autocomplete="username" required>
        </div>
      </div>

      <div class="auth-field">
        <label for="password">비밀번호</label>
        <div class="auth-input-wrap">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 7V5a3 3 0 1 1 6 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="password" id="password" name="password" placeholder="비밀번호 입력" autocomplete="current-password" required>
        </div>
      </div>

      <div class="auth-error" id="err-msg"></div>

      <button type="submit" class="auth-submit" id="submitBtn">로그인</button>

    </form>
  </div>

  <div class="auth-footer">
    계정이 없으신가요? <a href="/register">회원가입</a>
  </div>
  <div class="auth-footer">
    <a href="/static/recovery.html">비밀번호가 기억나지 않으신가요?</a> <!--/recovery로 변경-->
  </div>

</div>

<script>
'use strict';

document.getElementById('btnTheme').addEventListener('click', () => {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  document.getElementById('iconMoon').toggleAttribute('data-hidden', next === 'dark');
  document.getElementById('iconSun').toggleAttribute('data-hidden',  next === 'light');
});

document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();

  const username  = document.getElementById('username').value;
  const password  = document.getElementById('password').value;
  const errEl     = document.getElementById('err-msg');
  const submitBtn = document.getElementById('submitBtn');

  errEl.classList.remove('visible');
  submitBtn.disabled = true;
  submitBtn.textContent = '로그인 중…';

  fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password }),
  }).then(function(res) {
    if (res.status === 200) {
      window.location.href = '/main';
    } else {
      errEl.textContent = '아이디 또는 비밀번호가 틀렸습니다.';
      errEl.classList.add('visible');
      submitBtn.disabled = false;
      submitBtn.textContent = '로그인';
    }
  }).catch(function() {
    errEl.textContent = '네트워크 오류가 발생했어요. 다시 시도해 주세요.';
    errEl.classList.add('visible');
    submitBtn.disabled = false;
    submitBtn.textContent = '로그인';
  });
});
</script>
</body>
</html>
