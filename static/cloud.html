<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudFiles</title>
<link rel="stylesheet" href="/static/css/lightcloud.css">
</head>
<body>

<div class="app">

  <!-- ════ SIDEBAR ════ -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1C4.2 1 2 3.2 2 6c-1.1 0-2 .9-2 2s.9 2 2 2h10c1.1 0 2-.9 2-2s-.9-2-2-2c0-2.8-2.2-5-5-5z" fill="white"/>
        </svg>
      </div>
      CloudFiles
    </div>

    <div class="upload-wrap">
      <button class="btn-upload" id="btnUploadOpen">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v9M3 5l4-4 4 4M1 11h12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Upload
      </button>
    </div>

    <div class="nav-label">Folders</div>
    <nav id="folderNav">
      <a href="#" class="nav-link active" data-folder="">
        <svg width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M2 5h5l2 2h9v10H2z" fill="currentColor" opacity=".2" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        All Files <span class="count" id="countAll">0</span>
      </a>
    </nav>

    <div class="storage">
      <div>48.2 GB / 100 GB</div>
      <div class="storage-bar"><div class="storage-fill"></div></div>
    </div>
  </aside>

  <!-- ════ MAIN ════ -->
  <main class="main">

    <!-- Top bar -->
    <div class="top-bar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input class="search-input" type="search" id="searchInput" placeholder="Search files…">
      </div>

      <div class="view-toggle">
        <button class="btn-icon active" id="btnList" title="List view">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 3h12M1 7h12M1 11h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button class="btn-icon" id="btnGrid" title="Grid view">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="8" y="1" width="5" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="8" width="5" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="8" y="8" width="5" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>

      <button class="dark-toggle" id="btnTheme" title="Toggle dark mode">
        <svg id="iconMoon" width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M13.5 10A6 6 0 0 1 6 2.5a6 6 0 1 0 7.5 7.5z" fill="currentColor"/></svg>
        <svg id="iconSun"  width="15" height="15" viewBox="0 0 16 16" fill="none" data-hidden><circle cx="8" cy="8" r="3" fill="currentColor"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>

      <button class="btn btn-outline" id="btnShareSelected" data-hidden>
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="11" cy="3" r="1.8" stroke="currentColor" stroke-width="1.4"/><circle cx="3" cy="7" r="1.8" stroke="currentColor" stroke-width="1.4"/><circle cx="11" cy="11" r="1.8" stroke="currentColor" stroke-width="1.4"/><path d="M4.7 6l4-2M4.7 8l4 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        공유
      </button>

      <button class="btn btn-danger-outline" id="btnDeleteSelected" data-hidden>
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2h4v2M4 4l.8 8h4.4l.8-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        삭제 <span id="deleteCount">0</span>
      </button>
      <button class="btn btn-outline" id="btnDownloadSelected" data-hidden>
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 2v7M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        다운로드 <span id="downloadCount">0</span>
      </button>
    </div>

    <!-- Filter chips -->
    <div class="filter-bar">
      <span class="label">Filter:</span>
    </div>

    <!-- List view -->
    <div class="table-wrap" id="listView">
      <table>
        <thead>
          <tr>
            <th style="width:36px"><input type="checkbox" id="selectAll"></th>
            <th data-sort="name">Name</th>
            <th data-sort="sizeNum">Size</th>
            <th data-sort="mime">Type</th>
            <th data-sort="uploadedTime">Uploaded</th>
            <th style="width:130px">Actions</th>
          </tr>
        </thead>
        <tbody id="fileTableBody"></tbody>
      </table>
      <div class="empty" id="emptyList" data-hidden>No files found</div>
    </div>

    <!-- Grid view -->
    <div class="grid-wrap" id="gridView" data-hidden>
      <div class="file-grid" id="fileGrid"></div>
      <div class="empty" id="emptyGrid" data-hidden>No files found</div>
    </div>

  </main>
</div>

<!-- ════ UPLOAD MODAL ════ -->
<div class="modal-backdrop" id="uploadModal" data-hidden>
  <div class="modal">
    <div class="modal-header">
      <h4>파일 업로드</h4>
      <button class="modal-close" data-close="uploadModal">✕</button>
    </div>
    <div class="drop-zone" id="dropZone">
      <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
        <path d="M20 8v16M12 18l8-10 8 10M6 30h28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <p>파일을 드래그하거나 클릭해서 선택</p>
      <small>모든 파일 형식 지원</small>
    </div>
    <input type="file" id="fileInput" multiple style="display:none">
    <div class="upload-list" id="uploadList"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-close="uploadModal">취소</button>
      <button class="btn btn-primary" id="btnConfirmUpload">업로드</button>
    </div>
  </div>
</div>

<!-- ════ SHARE MODAL ════ -->
<div class="modal-backdrop" id="shareModal" data-hidden>
  <div class="modal">
    <div class="modal-header">
      <h4>공유 링크</h4>
      <button class="modal-close" data-close="shareModal">✕</button>
    </div>
    <p class="modal-subtitle" id="shareSubtitle"></p>
    <div class="share-input-row" id="shareInputRow" data-hidden>
      <input type="text" id="shareLinkInput" readonly>
      <button class="btn btn-primary" id="btnCopyLink">링크 복사</button>
    </div>
    <div class="copy-toast" id="copyToast"></div>
    <div>
      <label>만료</label>
      <input type="datetime-local" id="expireDate" placeholder="예: 7">
    </div>
    <div>
      <label>비밀번호</label>
      <input type="password" id="sharePassword" placeholder="">
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="btnCreateLink">링크 생성</button>
      <button class="btn btn-outline" data-close="shareModal">닫기</button>
    </div>
  </div>
</div>

<!-- ════ PERMISSION MODAL ════ -->
<div class="modal-backdrop" id="permModal" data-hidden>
  <div class="modal">
    <div class="modal-header">
      <h4 id="permModalTitle">권한 수정</h4>
      <button class="modal-close" data-close="permModal">✕</button>
    </div>
    <p class="modal-subtitle" id="permSubtitle"></p>
    <div class="field">
      <label>접근 레벨</label>
      <select id="permLevel">
        <option value="private">🔒 비공개 (본인만)</option>
        <option value="org">🏢 조직 내 공유</option>
        <option value="public">🌐 공개 링크</option>
      </select>
    </div>
    <div class="field" id="ownerField" data-hidden>
      <label>소유자 이메일</label>
      <input type="email" id="ownerEmail" placeholder="example@company.com">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-close="permModal">취소</button>
      <button class="btn btn-primary" id="btnSavePerm">저장</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════
  API LAYER — fetch 기반 REST 구조
  실제 사용 시 BASE_URL과 각 함수의 주석 참고
═══════════════════════════════════════════ */

const api = {

  // GET /files
  async getFiles(){
    const res = await fetch('/files', {credentials: 'include'})
    if (!res.ok) throw new Error(await res.text())
    return res.json()
  },

  /** DELETE /files  body: { ids: [] } */
  async deleteFiles(ids) {
    
  },

  // POST /files/upload
  async uploadFiles(fileList) {
    const fd = new FormData()
    for (const f of fileList) fd.append('file', f)
    const res =  await fetch('/upload', {method: 'POST', credentials: 'include', body: fd})
    if (!res.ok) throw new Error(await res.text())
    return res.json()    
  },

  /** PATCH /files/:id/permission */
  async updatePermission(id, level) {
    
  },

  /** PATCH /files/:id/owner */
  async updateOwner(id, email) {
    
  },

  /** POST /files/:id/share → returns share URL */
  async createShareLink(ids, hours, password) {
    const res = await fetch('/share/create',{
      method: 'POST',
      credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({file_ids: ids, expires_hours: hours, password: password})
    })
    if (!res.ok) throw new Error(await res.text())
    const data = await res.json()
    return { url: `${window.location.origin}/share?token=${data.token}` }
  },
};

/* ═══════════════════════════════════════════
   MOCK DATA
═══════════════════════════════════════════ */
const EXT_COLOR = {
  jpeg:'#a259ff', png:'#a259ff',gif:'#a259ff',webp:'#a259ff',
  pdf:'#f2724a',
  doc:'#2563eb',docx:'#2563eb',
  xls:'#1e8a44',xlsx:'#1e8a44',csv:'#1e8a44',
  mp4:'#2bbfa4',webm:'#2bbfa4',
  mp3:'#f5a623',wav:'#f5a623',
  json:'#3b82f6',sql:'#3b82f6',db:'#3b82f6',py:'#3b82f6',c:'#3b82f6',cpp:'#3b82f6',go:'#3b82f6',cs:'#3b82f6',html:'#3b82f6',js:'#3b82f6',ts:'#3b82f6',css:'#3b82f6',
  zip:'#6b7280',tar:'#6b7280'
};

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const state = {
  files: [],
  search: '',
  folder: '',
  mime: '',
  sortKey: 'uploadedTime',
  sortDir: 'desc',
  view: 'list',
  selected: new Set(),
  theme: 'light',
  loading: false,
};

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function getColor(mime) { return EXT_COLOR[mime] || '#1a1830'; }

function formatBytes(b) {
  if (b < 1024) return `${b} B`;
  if (b < 1048576) return `${(b/1024).toFixed(0)} KB`;
  if (b < 1073741824) return `${(b/1048576).toFixed(1)} MB`;
  return `${(b/1073741824).toFixed(1)} GB`
}

function extIconHTML(mime) {
  const c = getColor(mime);
  const label = mime.toUpperCase().slice(0,3);
  return `<div class="ext-icon" style="color:${c};border-color:${c}33;background:${c}11">
    <svg width="12" height="14" viewBox="0 0 14 16" fill="none">
      <path d="M1 1h9l3 3v11H1z" fill="${c}22" stroke="${c}" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M10 1l3 3h-3z" fill="${c}" opacity=".4"/>
    </svg>
    <span>${label}</span>
  </div>`;
}

function getFiltered() {
  return state.files
    .filter(f => {
      if (state.folder && f.folder !== state.folder) return false;
      if (state.mime   && f.mime   !== state.mime)   return false;
      if (state.search && !f.name.toLowerCase().includes(state.search.toLowerCase())) return false;
      return true;
    })
    .sort((a, b) => {
      const v = a[state.sortKey] < b[state.sortKey] ? -1 : a[state.sortKey] > b[state.sortKey] ? 1 : 0;
      return state.sortDir === 'asc' ? v : -v;
    });
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function render() {
  const filtered = getFiltered();

  // sort arrows
  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    th.classList.toggle('sorted', th.dataset.sort === state.sortKey);
    const key = th.dataset.sort;
    const label = { name:'Name', sizeNum:'Size', mime:'Type', uploadedTime:'Uploaded' }[key];
    th.textContent = label + (key === state.sortKey ? (state.sortDir === 'asc' ? ' ↑' : ' ↓') : '');
  });

  // ── list ──
  const tbody = document.getElementById('fileTableBody');
  tbody.innerHTML = filtered.map(f => `
    <tr>
      <td><input type="checkbox" data-id="${f.id}" ${state.selected.has(f.id) ? 'checked' : ''}></td>
      <td>
        <div class="file-cell">
          ${extIconHTML(f.mime)}
          <span class="file-name">${f.name}</span>
        </div>
      </td>
      <td><span class="mono">${f.size}</span></td>
      <td>
        <span class="badge" style="background:${getColor(f.mime)}22;color:${getColor(f.mime)}">
          ${f.mime.toUpperCase()}
        </span>
      </td>
      <td><span class="mono">${f.uploadedTime}</span></td>
      <td>
        <div class="row-actions">
          <button class="btn-icon btn-dl" title="다운로드" data-action="download" data-id="${f.id}">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 7l3 3 3-3M1 11h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <button class="btn-icon btn-share" title="공유" data-action="share" data-id="${f.id}">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="11" cy="3" r="1.8" stroke="currentColor" stroke-width="1.4"/><circle cx="3" cy="7" r="1.8" stroke="currentColor" stroke-width="1.4"/><circle cx="11" cy="11" r="1.8" stroke="currentColor" stroke-width="1.4"/><path d="M4.7 6l4-2M4.7 8l4 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </button>
          <button class="btn-icon btn-del" title="삭제" data-action="delete" data-id="${f.id}">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2h4v2M4 4l.8 8h4.4l.8-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <div class="dropdown-wrap">
            <button class="btn-icon btn-more" title="더보기" data-action="more" data-id="${f.id}">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="3" r="1.2" fill="currentColor"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/><circle cx="7" cy="11" r="1.2" fill="currentColor"/></svg>
            </button>
            <div class="dropdown-menu" id="dd-${f.id}" data-hidden>
              <button data-action="perm" data-id="${f.id}">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="3" y="6" width="8" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 6V4a2 2 0 1 1 4 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                권한 수정
              </button>
              <button data-action="owner" data-id="${f.id}">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="4" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M1 13c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                소유자 수정
              </button>
              <div class="divider"></div>
              <button class="danger" data-action="delete" data-id="${f.id}">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2h4v2M4 4l.8 8h4.4l.8-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                삭제
              </button>
            </div>
          </div>
        </div>
      </td>
    </tr>
  `).join('');

  document.getElementById('emptyList').toggleAttribute('data-hidden', filtered.length > 0);

  // ── grid ──
  const grid = document.getElementById('fileGrid');
  grid.innerHTML = filtered.map(f => `
    <div class="grid-card">
      ${extIconHTML(f.mime)}
      <div class="fname">${f.name}</div>
      <div class="fsize">${f.size}</div>
      <div class="row-actions" style="justify-content:center">
        <button class="btn-icon btn-dl" style="width:26px;height:26px" title="다운로드" data-action="download" data-id="${f.id}">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 7l3 3 3-3M1 11h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button class="btn-icon btn-share" style="width:26px;height:26px" data-action="share" data-id="${f.id}">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><circle cx="11" cy="3" r="1.8" stroke="currentColor" stroke-width="1.4"/><circle cx="3" cy="7" r="1.8" stroke="currentColor" stroke-width="1.4"/><circle cx="11" cy="11" r="1.8" stroke="currentColor" stroke-width="1.4"/><path d="M4.7 6l4-2M4.7 8l4 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
        <button class="btn-icon btn-del" style="width:26px;height:26px" data-action="delete" data-id="${f.id}">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2h4v2M4 4l.8 8h4.4l.8-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <div class="dropdown-wrap">
          <button class="btn-icon btn-more" style="width:26px;height:26px" data-action="more" data-id="g${f.id}">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="3" r="1.2" fill="currentColor"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/><circle cx="7" cy="11" r="1.2" fill="currentColor"/></svg>
          </button>
          <div class="dropdown-menu" id="dd-g${f.id}" data-hidden style="right:auto;left:0">
            <button data-action="perm" data-id="${f.id}">권한 수정</button>
            <button data-action="owner" data-id="${f.id}">소유자 수정</button>
            <div class="divider"></div>
            <button class="danger" data-action="delete" data-id="${f.id}">삭제</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('emptyGrid').toggleAttribute('data-hidden', filtered.length > 0);

  // select-all state
  const allCb = document.getElementById('selectAll');
  allCb.checked = filtered.length > 0 && filtered.every(f => state.selected.has(f.id));
  allCb.indeterminate = !allCb.checked && filtered.some(f => state.selected.has(f.id));

  updateBulkButtons();
}

function updateBulkButtons() {
  const n = state.selected.size;
  document.getElementById('btnDeleteSelected').toggleAttribute('data-hidden', n === 0);
  document.getElementById('btnShareSelected').toggleAttribute('data-hidden', n === 0);
  document.getElementById('deleteCount').textContent = n;
  document.getElementById('btnDownloadSelected').toggleAttribute('data-hidden', n === 0);
  document.getElementById('downloadCount').textContent = n;
}

/* ═══════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════ */
async function deleteFiles(ids) {
}

async function renderFileFliter(){
  const original = state.files.map(m => m.mime)
  const unique = [...new Set(original)]
  const bar = document.querySelector('.filter-bar')
  bar.innerHTML = '<span class="label">Filter:</span>' + '<div class="chip active" data-mime="">All</div>' + unique.map(m => `<div class="chip" data-mime="${m}">${m.toUpperCase()}</div>`).join('')
  document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    state.mime = chip.dataset.mime;
    render();
  });
  });
}

async function loadFiles() {
  const data = await api.getFiles()
  state.files = [...data.mine, ...data.shared].map(f => ({ id: f.id, name: f.original_name, size: formatBytes(f.size), mime: f.mime_type.split('/')[1], uploadedTime: f.created_at.slice(0, 10), sizeNum: f.size}))
  document.getElementById('countAll').textContent = state.files.length
  renderFileFliter()
  render();
}

/* ═══════════════════════════════════════════
  MODAL HELPERS
═══════════════════════════════════════════ */
function openModal(id)  { document.getElementById(id).removeAttribute('data-hidden'); }
function closeModal(id) { document.getElementById(id).setAttribute('data-hidden', ''); }

document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});
document.querySelectorAll('[data-close]').forEach(btn => {
  btn.addEventListener('click', () => closeModal(btn.dataset.close));
});

/* ═══════════════════════════════════════════
   UPLOAD MODAL
═══════════════════════════════════════════ */
let pendingFiles = [];

document.getElementById('btnUploadOpen').addEventListener('click', () => {
  pendingFiles = [];
  renderUploadList();
  document.getElementById('fileInput').value = '';
  openModal('uploadModal');
});

document.getElementById('dropZone').addEventListener('click', () => document.getElementById('fileInput').click());

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', ()  => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  addPendingFiles(e.dataTransfer.files);
});
document.getElementById('fileInput').addEventListener('change', e => addPendingFiles(e.target.files));

function addPendingFiles(fileList) {
  pendingFiles = [...pendingFiles, ...Array.from(fileList)];
  renderUploadList();
}
function renderUploadList() {
  document.getElementById('uploadList').innerHTML = pendingFiles.map((f, i) => `
    <div class="upload-item">
      <svg width="13" height="13" viewBox="0 0 14 16" fill="none"><path d="M1 1h9l3 3v11H1z" fill="var(--primary-bg)" stroke="var(--primary)" stroke-width="1.2" stroke-linejoin="round"/></svg>
      <span class="ui-name">${f.name}</span>
      <span class="ui-size">${formatBytes(f.size)}</span>
      <button class="ui-remove" data-index="${i}">✕</button>
    </div>
  `).join('');
}
document.getElementById('uploadList').addEventListener('click', e => {
  const btn = e.target.closest('[data-index]');
  if (!btn) return;
  pendingFiles.splice(Number(btn.dataset.index), 1);
  renderUploadList();
});

document.getElementById('btnConfirmUpload').addEventListener('click', async () => {
  if (!pendingFiles.length) return;
  try {
    closeModal('uploadModal');
    await api.uploadFiles(pendingFiles);
    pendingFiles = [];
    await loadFiles();
  } catch (e) {
    alert('업로드 실패: ' + e.message);
  }
});

/* ═══════════════════════════════════════════
   SHARE MODAL
═══════════════════════════════════════════ */

let shareTargetIDs = []; //공유할 id 들
async function openShareModal(ids, subtitle) {
  shareTargetIDs = ids
  document.getElementById('shareSubtitle').textContent = subtitle;
  document.getElementById('copyToast').textContent = '';
  openModal('shareModal');
}

document.getElementById('btnCopyLink').addEventListener('click', () => {
  const val = document.getElementById('shareLinkInput').value;
  navigator.clipboard?.writeText(val).catch(() => {});
  const t = document.getElementById('copyToast');
  t.textContent = '✓ 클립보드에 복사됐어요';
  setTimeout(() => t.textContent = '', 2500);
});

document.getElementById('btnCreateLink').addEventListener('click', async () => {
  const deadline = new Date(document.getElementById('expireDate').value)
  const hours = Math.floor((deadline - Date.now()) / (1000 * 60 * 60))
  const password = document.getElementById('sharePassword').value
  try {
    const {url} = await api.createShareLink(shareTargetIDs, hours, password)
    document.getElementById('shareLinkInput').value = url
    document.getElementById('shareInputRow').removeAttribute('data-hidden')
  } catch(e) {
    alert('링크 생성 실패: ' + e.message)
  }
})

document.getElementById('btnShareSelected').addEventListener('click', () => {
  const ids = [...state.selected];
  openShareModal(ids, `선택된 ${ids.length}개 파일`);
});

/* ═══════════════════════════════════════════
   PERMISSION MODAL
═══════════════════════════════════════════ */
let permTarget = null;
let permMode = 'perm';

function openPermModal(fileId, mode) {
  permTarget = fileId;
  permMode = mode;
  const file = state.files.find(f => f.id === fileId);
  document.getElementById('permModalTitle').textContent = mode === 'owner' ? '소유자 수정' : '권한 수정';
  document.getElementById('permSubtitle').textContent = file?.name || '';
  document.getElementById('ownerField').toggleAttribute('data-hidden', mode !== 'owner');
  openModal('permModal');
}

document.getElementById('btnSavePerm').addEventListener('click', async () => {
  if (permMode === 'owner') {
    const email = document.getElementById('ownerEmail').value.trim();
    if (!email) return;
    await api.updateOwner(permTarget, email);
  } else {
    const level = document.getElementById('permLevel').value;
    await api.updatePermission(permTarget, level);
  }
  closeModal('permModal');
});

/* ═══════════════════════════════════════════
   DROPDOWN
═══════════════════════════════════════════ */
let openDd = null;
function closeAllDropdowns() {
  document.querySelectorAll('.dropdown-menu').forEach(m => m.setAttribute('data-hidden', ''));
  openDd = null;
}
document.addEventListener('click', e => {
  if (!e.target.closest('.dropdown-wrap')) closeAllDropdowns();
});

/* ═══════════════════════════════════════════
   EVENT DELEGATION
═══════════════════════════════════════════ */
function handleAction(action, id) {
  switch (action) {
    case 'delete':
      closeAllDropdowns();
      deleteFiles([id]);
      break;
    case 'share':
      closeAllDropdowns();
      const f = state.files.find(x => x.id === id);
      openShareModal([id], f?.name || '');
      break;
    case 'download':
      window.location.href= `/download?id=${id}`;
      break;
    case 'perm':
      closeAllDropdowns();
      openPermModal(ids, 'perm');
      break;
    case 'owner':
      closeAllDropdowns();
      openPermModal(ids, 'owner');
      break;
    case 'more': {
      const ddId = `dd-${id}`;
      if (openDd === ddId) { closeAllDropdowns(); break; }
      closeAllDropdowns();
      openDd = ddId;
      document.getElementById(ddId)?.removeAttribute('data-hidden');
      break;
    }
  }
}

document.getElementById('fileTableBody').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  const cb  = e.target.closest('input[type="checkbox"][data-id]');
  if (btn) handleAction(btn.dataset.action, btn.dataset.id);
  if (cb) {
    const id = cb.dataset.id;
    cb.checked ? state.selected.add(id) : state.selected.delete(id);
    updateBulkButtons();
    render();
  }
});

document.getElementById('fileGrid').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (btn) handleAction(btn.dataset.action, btn.dataset.id);
});

document.getElementById('selectAll').addEventListener('change', e => {
  getFiltered().forEach(f => e.target.checked ? state.selected.add(f.id) : state.selected.delete(f.id));
  updateBulkButtons();
  render();
});

document.getElementById('btnDeleteSelected').addEventListener('click', () => {
  deleteFiles([...state.selected]);
});

document.getElementById('btnDownloadSelected').addEventListener('click', () => {
    const ids = [...state.selected];
    const params = ids.map(id => `id=${encodeURIComponent(id)}`).join('&');
    window.location.href = `/download?${params}`;
  });

/* ═══════════════════════════════════════════
   SEARCH, FILTER, SORT
═══════════════════════════════════════════ */
document.getElementById('searchInput').addEventListener('input', e => {
  state.search = e.target.value;
  render();
});

document.querySelectorAll('thead').forEach(thead => {
  thead.addEventListener('click', e => {
    const th = e.target.closest('th[data-sort]');
    if (!th) return;
    if (state.sortKey === th.dataset.sort) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
    else { state.sortKey = th.dataset.sort; state.sortDir = 'asc'; }
    render();
  });
});

document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    state.folder = link.dataset.folder;
    render();
  });
});

/* ═══════════════════════════════════════════
   VIEW TOGGLE
═══════════════════════════════════════════ */
document.getElementById('btnList').addEventListener('click', () => {
  state.view = 'list';
  document.getElementById('listView').removeAttribute('data-hidden');
  document.getElementById('gridView').setAttribute('data-hidden', '');
  document.getElementById('btnList').classList.add('active');
  document.getElementById('btnGrid').classList.remove('active');
});
document.getElementById('btnGrid').addEventListener('click', () => {
  state.view = 'grid';
  document.getElementById('gridView').removeAttribute('data-hidden');
  document.getElementById('listView').setAttribute('data-hidden', '');
  document.getElementById('btnGrid').classList.add('active');
  document.getElementById('btnList').classList.remove('active');
});

/* ═══════════════════════════════════════════
   DARK MODE
═══════════════════════════════════════════ */
document.getElementById('btnTheme').addEventListener('click', () => {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('iconMoon').toggleAttribute('data-hidden', state.theme === 'dark');
  document.getElementById('iconSun').toggleAttribute('data-hidden',  state.theme === 'light');
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
loadFiles();
</script>
