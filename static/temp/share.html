<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudFiles — 공유 파일</title>
<link rel="stylesheet" href="/static/css/lightcloud.css">
<style>
/* ── share.html 전용 추가 스타일 ── */

/* 전체 화면 중앙 레이아웃 */
.share-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  padding: 1.5rem;
}

/* 상단 브랜드 */
.share-brand {
  display: flex;
  align-items: center;
  gap: .6rem;
  margin-bottom: 2rem;
  font-weight: 700;
  font-size: .95rem;
  color: var(--text);
}

/* 공유 카드 (비밀번호 / 로딩) */
.share-card {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  padding: 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  animation: modal-in .2s ease;
}

.share-card-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  background: var(--primary-bg);
  display: flex; align-items: center; justify-content: center;
  color: var(--primary);
}

.share-card h3 {
  font-size: 1rem; font-weight: 700;
  color: var(--text); text-align: center; margin: 0;
}
.share-card p {
  font-size: .82rem; color: var(--text-muted);
  text-align: center; margin: -.25rem 0 0;
}

/* 비밀번호 입력 */
.pw-form {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: .6rem;
}
.pw-input-wrap { position: relative; }
.pw-input-wrap input {
  width: 100%;
  padding: .55rem .75rem .55rem 2.4rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg); color: var(--text);
  font-size: .88rem; outline: none;
  transition: border-color var(--transition);
}
.pw-input-wrap input:focus { border-color: var(--primary); }
.pw-input-wrap svg {
  position: absolute; left: .75rem; top: 50%;
  transform: translateY(-50%);
  pointer-events: none; color: var(--text-dim);
}
.pw-error {
  font-size: .76rem; color: var(--danger);
  min-height: 1rem; padding: 0 .1rem;
}

/* 로딩 스피너 */
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 파일 목록 페이지 */
.share-main {
  width: 100%;
  max-width: 780px;
  animation: modal-in .2s ease;
}

.share-header {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 1rem;
  margin-bottom: 1.25rem;
}
.share-header-info { display: flex; align-items: center; gap: .75rem; }
.share-header-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--primary-bg); color: var(--primary);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.share-title { font-size: 1rem; font-weight: 700; color: var(--text); }
.share-meta {
  font-size: .76rem; color: var(--text-dim);
  display: flex; gap: .75rem; margin-top: .15rem; flex-wrap: wrap;
}
.share-meta span { display: flex; align-items: center; gap: .3rem; }

.share-header-actions { display: flex; gap: .5rem; flex-shrink: 0; }

/* 검색 + 다운로드 툴바 */
.share-toolbar {
  display: flex; align-items: center; gap: .65rem;
  margin-bottom: .75rem; flex-wrap: wrap;
}
.share-toolbar .search-wrap { flex: 1; min-width: 160px; }

/* 파일 목록 컨테이너 */
.share-file-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* 파일 목록만 스크롤 */
.share-file-scroll {
  overflow-y: auto;
  max-height: 420px;
}

/* 파일 행 */
.share-file-item {
  display: flex; align-items: center; gap: .75rem;
  padding: .75rem 1rem;
  border-bottom: 1px solid var(--border-subtle);
  transition: background var(--transition);
}
.share-file-item:last-child { border-bottom: none; }
.share-file-item:hover { background: var(--surface2); }

.sfi-check { flex-shrink: 0; }
.sfi-icon  { flex-shrink: 0; }
.sfi-info  { flex: 1; min-width: 0; }
.sfi-name  { font-weight: 500; font-size: .85rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sfi-meta  { font-size: .72rem; color: var(--text-dim); font-family: var(--ff-mono); display: flex; gap: .5rem; margin-top: .1rem; }
.sfi-actions { display: flex; align-items: center; gap: .3rem; flex-shrink: 0; }

/* 만료 배너 */
.expire-banner {
  display: flex; align-items: center; gap: .5rem;
  background: color-mix(in srgb, var(--danger) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--danger) 25%, transparent);
  border-radius: var(--radius); padding: .55rem .9rem;
  font-size: .78rem; color: var(--danger); margin-bottom: 1rem;
}

/* 일괄 다운로드 바 */
.bulk-bar {
  display: flex; align-items: center; gap: .65rem;
  padding: .6rem 1rem;
  background: var(--primary-bg);
  border-bottom: 1px solid var(--border);
  font-size: .82rem; color: var(--primary); font-weight: 500;
}
.bulk-bar span { flex: 1; }

/* 다크 토글 (우상단) */
.share-theme-btn {
  position: fixed; top: 1rem; right: 1rem;
  z-index: 10;
}

/* 빈 상태 */
.share-empty {
  text-align: center; padding: 2.5rem 1rem;
  color: var(--text-dim); font-size: .85rem;
}
</style>
</head>
<body>

<!-- 다크 토글 -->
<button class="dark-toggle share-theme-btn" id="btnTheme" title="Toggle dark mode">
  <svg id="iconMoon" width="15" height="15" viewBox="0 0 16 16" fill="none">
    <path d="M13.5 10A6 6 0 0 1 6 2.5a6 6 0 1 0 7.5 7.5z" fill="currentColor"/>
  </svg>
  <svg id="iconSun" width="15" height="15" viewBox="0 0 16 16" fill="none" data-hidden>
    <circle cx="8" cy="8" r="3" fill="currentColor"/>
    <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </svg>
</button>

<div class="share-page" id="sharePage">

  <!-- 브랜드 로고 -->
  <div class="share-brand">
    <div class="logo-mark">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1C4.2 1 2 3.2 2 6c-1.1 0-2 .9-2 2s.9 2 2 2h10c1.1 0 2-.9 2-2s-.9-2-2-2c0-2.8-2.2-5-5-5z" fill="white"/>
      </svg>
    </div>
    CloudFiles
  </div>

  <!-- ════ 상태 1: 로딩 ════ -->
  <div class="share-card" id="stateLoading">
    <div class="spinner"></div>
    <p style="color:var(--text-muted);font-size:.84rem">공유 링크를 확인하는 중…</p>
  </div>

  <!-- ════ 상태 2: 비밀번호 ════ -->
  <div class="share-card" id="statePassword" data-hidden>
    <div class="share-card-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
      </svg>
    </div>
    <h3>비밀번호가 필요해요</h3>
    <p>이 공유 링크는 비밀번호로 보호되어 있어요</p>

    <form class="pw-form" id="pwForm">
      <div class="pw-input-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <input type="password" id="pwInput" placeholder="비밀번호 입력" autocomplete="current-password">
      </div>
      <div class="pw-error" id="pwError"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v9M3 5l4-4 4 4M1 11h12" stroke="white" stroke-width="1.5" stroke-linecap="round" style="transform:rotate(180deg);transform-origin:center"/>
        </svg>
        확인
      </button>
    </form>
  </div>

  <!-- ════ 상태 3: 파일 목록 ════ -->
  <div class="share-main" id="stateFiles" data-hidden>

    <!-- 만료 배너 (조건부) -->
    <div class="expire-banner" id="expireBanner" data-hidden>
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M8 5v3.5L10 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span id="expireText"></span>
    </div>

    <!-- 헤더 -->
    <div class="share-header">
      <div class="share-header-info">
        <div class="share-header-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M3 6h5l3 3h10v12H3z" fill="currentColor" opacity=".15" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="share-title" id="shareTitle">공유된 파일</div>
          <div class="share-meta">
            <span>
              <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="5" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M2 13c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              <span id="sharedBy"></span>
            </span>
            <span>
              <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.3"/><path d="M8 5v3.5L10 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              <span id="sharedExpire"></span>
            </span>
            <span>
              <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M4 5h6M4 7.5h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              <span id="fileCountMeta"></span>
            </span>
          </div>
        </div>
      </div>
      <div class="share-header-actions">
        <button class="btn btn-primary" id="btnDownloadAll">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            <path d="M7 1v8M4 7l3 3 3-3M1 11h12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          전체 다운로드
        </button>
      </div>
    </div>

    <!-- 툴바 -->
    <div class="share-toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input class="search-input" type="search" id="shareSearch" placeholder="파일 검색…">
      </div>
    </div>

    <!-- 파일 목록 컨테이너 -->
    <div class="share-file-wrap">

      <!-- 일괄 선택 바 -->
      <div class="bulk-bar" id="bulkBar" data-hidden>
        <input type="checkbox" id="selectAllShare">
        <span id="bulkLabel">0개 선택됨</span>
        <button class="btn btn-primary" id="btnDownloadSelected" style="padding:.35rem .8rem;font-size:.78rem">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
            <path d="M7 1v8M4 7l3 3 3-3M1 11h12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          선택 다운로드
        </button>
      </div>

      <!-- 헤더 행 -->
      <div style="display:flex;align-items:center;gap:.75rem;padding:.5rem 1rem;border-bottom:1.5px solid var(--border);">
        <div style="flex-shrink:0;width:16px">
          <input type="checkbox" id="selectAllShareHeader" title="전체 선택">
        </div>
        <div style="flex:1;font-size:.7rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-dim)">파일명</div>
        <div style="width:80px;font-size:.7rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-dim);text-align:right">크기</div>
        <div style="width:90px"></div>
      </div>

      <div class="share-file-scroll">
        <div id="shareFileList"></div>
        <div class="share-empty" id="shareEmpty" data-hidden>파일을 찾을 수 없어요</div>
      </div>
    </div>

  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════
   API LAYER (fetch 연결은 나중에)
═══════════════════════════════════════════ */
const api = {
  /** GET /share?token=xxx → { share, files } */
  async getShare(token) {
    // TODO:
    // const res = await fetch(`/share?token=${token}`, { credentials: 'include' });
    // if (!res.ok) throw new Error(await res.text());
    // return res.json();
    return mockDelay(MOCK_SHARE);
  },

  /** POST /share/verify → { ok, error? } */
  async verifyPassword(token, password) {
    // TODO:
    // const res = await fetch('/share/verify', {
    //   method: 'POST', credentials: 'include',
    //   headers: { 'Content-Type': 'application/json' },
    //   body: JSON.stringify({ token, password }),
    // });
    // if (!res.ok) throw new Error(await res.text());
    // return res.json();
    return mockDelay(password === '1234' ? { ok: true } : { ok: false, error: '비밀번호가 틀렸어요' });
  },

  /** GET /share/download?token=xxx&ids=1,2 */
  downloadUrl(token, ids) {
    // TODO: return `/share/download?token=${token}&ids=${ids.join(',')}`;
    return '#';
  },
};

function mockDelay(data, ms = 800) {
  return new Promise(r => setTimeout(() => r(data), ms));
}

/* ═══════════════════════════════════════════
   MOCK DATA
═══════════════════════════════════════════ */
const MOCK_SHARE = {
  share: {
    title: '2026 Q2 디자인 에셋',
    sharedBy: 'jina@company.com',
    expiresAt: '2026-05-10T23:59:00',
    hasPassword: true,
    fileCount: 5,
  },
  files: [
    { id: 1, name: 'Brand Guidelines.pdf',   size: 4412416,  mime: 'pdf',  uploadedAt: '2026-04-22' },
    { id: 2, name: 'Hero Banner.figma',       size: 13421772, mime: 'fig',  uploadedAt: '2026-04-20' },
    { id: 3, name: 'Campaign Video.mp4',      size: 249561088,mime: 'mp4',  uploadedAt: '2026-04-18' },
    { id: 4, name: 'Q2 Report.xlsx',          size: 1153433,  mime: 'xls',  uploadedAt: '2026-04-15' },
    { id: 5, name: 'Product Photos.zip',      size: 95420416, mime: 'zip',  uploadedAt: '2026-03-22' },
  ],
};

const EXT_COLOR = {
  pdf:'#f2724a', fig:'#a259ff', figma:'#a259ff', mp4:'#2bbfa4',
  xls:'#1e8a44', xlsx:'#1e8a44', doc:'#2563eb', docx:'#2563eb',
  yml:'#f5a623', yaml:'#f5a623', sql:'#3b82f6', zip:'#6b7280',
};

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const state = {
  phase: 'loading',   // 'loading' | 'password' | 'files'
  token: '',
  share: null,
  files: [],
  filtered: [],
  selected: new Set(),
  search: '',
  theme: 'light',
};

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function getColor(mime) { return EXT_COLOR[mime] || '#888'; }

function formatBytes(b) {
  if (b < 1024) return `${b} B`;
  if (b < 1048576) return `${(b / 1024).toFixed(0)} KB`;
  if (b < 1073741824) return `${(b / 1048576).toFixed(1)} MB`;
  return `${(b / 1073741824).toFixed(1)} GB`;
}

function extIconHTML(mime, size = 32) {
  const c = getColor(mime);
  const label = mime.toUpperCase().slice(0, 3);
  const h = Math.round(size * 1.18);
  return `<div class="ext-icon" style="width:${size}px;height:${h}px;color:${c};border-color:${c}33;background:${c}11">
    <svg width="${Math.round(size*0.37)}" height="${Math.round(size*0.44)}" viewBox="0 0 14 16" fill="none">
      <path d="M1 1h9l3 3v11H1z" fill="${c}22" stroke="${c}" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M10 1l3 3h-3z" fill="${c}" opacity=".4"/>
    </svg>
    <span>${label}</span>
  </div>`;
}

function formatExpire(iso) {
  const d = new Date(iso);
  const now = Date.now();
  const diff = d - now;
  if (diff <= 0) return '만료됨';
  const days = Math.floor(diff / 86400000);
  if (days > 0) return `${days}일 후 만료`;
  const hours = Math.floor(diff / 3600000);
  if (hours > 0) return `${hours}시간 후 만료`;
  return '곧 만료됨';
}

function getFiltered() {
  if (!state.search) return state.files;
  const q = state.search.toLowerCase();
  return state.files.filter(f => f.name.toLowerCase().includes(q));
}

/* ═══════════════════════════════════════════
   PHASE TRANSITIONS
═══════════════════════════════════════════ */
function showPhase(phase) {
  state.phase = phase;
  document.getElementById('stateLoading').toggleAttribute('data-hidden',  phase !== 'loading');
  document.getElementById('statePassword').toggleAttribute('data-hidden', phase !== 'password');
  document.getElementById('stateFiles').toggleAttribute('data-hidden',    phase !== 'files');
}

/* ═══════════════════════════════════════════
   RENDER FILE LIST
═══════════════════════════════════════════ */
function renderFiles() {
  const list   = document.getElementById('shareFileList');
  const empty  = document.getElementById('shareEmpty');
  const filtered = getFiltered();

  if (!filtered.length) {
    list.innerHTML = '';
    empty.removeAttribute('data-hidden');
    return;
  }
  empty.setAttribute('data-hidden', '');

  list.innerHTML = filtered.map(f => `
    <div class="share-file-item">
      <div class="sfi-check">
        <input type="checkbox" data-id="${f.id}" ${state.selected.has(f.id) ? 'checked' : ''}>
      </div>
      <div class="sfi-icon">${extIconHTML(f.mime, 28)}</div>
      <div class="sfi-info">
        <div class="sfi-name">${f.name}</div>
        <div class="sfi-meta">
          <span>${formatBytes(f.size)}</span>
          <span>${f.uploadedAt}</span>
        </div>
      </div>
      <div class="sfi-actions">
        <button class="btn-icon btn-dl" title="다운로드" data-action="download" data-id="${f.id}">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            <path d="M7 1v8M4 7l3 3 3-3M1 11h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
  `).join('');

  updateBulkBar();
  syncSelectAll();
}

function updateBulkBar() {
  const n = state.selected.size;
  document.getElementById('bulkBar').toggleAttribute('data-hidden', n === 0);
  document.getElementById('bulkLabel').textContent = `${n}개 선택됨`;
}

function syncSelectAll() {
  const filtered = getFiltered();
  const allCb = document.getElementById('selectAllShareHeader');
  allCb.checked      = filtered.length > 0 && filtered.every(f => state.selected.has(f.id));
  allCb.indeterminate = !allCb.checked && filtered.some(f => state.selected.has(f.id));
  document.getElementById('selectAllShare').checked = allCb.checked;
}

/* ═══════════════════════════════════════════
   FILL SHARE INFO
═══════════════════════════════════════════ */
function fillShareInfo(share) {
  document.title = `CloudFiles — ${share.title}`;
  document.getElementById('shareTitle').textContent   = share.title;
  document.getElementById('sharedBy').textContent     = share.sharedBy;
  document.getElementById('sharedExpire').textContent = formatExpire(share.expiresAt);
  document.getElementById('fileCountMeta').textContent = `${share.fileCount}개 파일`;

  // 만료 임박 배너
  const diff = new Date(share.expiresAt) - Date.now();
  if (diff < 86400000 && diff > 0) {
    document.getElementById('expireText').textContent = `⚠️ 이 링크는 ${formatExpire(share.expiresAt)} 만료돼요`;
    document.getElementById('expireBanner').removeAttribute('data-hidden');
  }
  if (diff <= 0) {
    document.getElementById('expireText').textContent = '이 공유 링크는 만료됐어요';
    document.getElementById('expireBanner').removeAttribute('data-hidden');
  }
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
async function init() {
  showPhase('loading');

  // 실제 연동 시: const token = new URLSearchParams(location.search).get('token');
  const token = 'mock-token';
  state.token = token;

  const data = await api.getShare(token);
  state.share = data.share;
  state.files = data.files;

  if (data.share.hasPassword) {
    showPhase('password');
  } else {
    fillShareInfo(data.share);
    showPhase('files');
    renderFiles();
  }
}

/* ═══════════════════════════════════════════
   비밀번호 제출
═══════════════════════════════════════════ */
document.getElementById('pwForm').addEventListener('submit', async e => {
  e.preventDefault();
  const pw  = document.getElementById('pwInput').value;
  const err = document.getElementById('pwError');
  const btn = e.target.querySelector('button[type="submit"]');

  err.textContent = '';
  btn.disabled = true;
  btn.textContent = '확인 중…';

  const result = await api.verifyPassword(state.token, pw);

  btn.disabled = false;
  btn.textContent = '확인';

  if (result.ok) {
    fillShareInfo(state.share);
    showPhase('files');
    renderFiles();
  } else {
    err.textContent = result.error || '비밀번호가 틀렸어요';
    document.getElementById('pwInput').focus();
  }
});

/* ═══════════════════════════════════════════
   파일 목록 이벤트
═══════════════════════════════════════════ */
// 체크박스 위임
document.getElementById('shareFileList').addEventListener('change', e => {
  const cb = e.target.closest('input[type="checkbox"][data-id]');
  if (!cb) return;
  const id = Number(cb.dataset.id);
  cb.checked ? state.selected.add(id) : state.selected.delete(id);
  updateBulkBar();
  syncSelectAll();
});

// 전체 선택 (헤더)
function handleSelectAll(checked) {
  getFiltered().forEach(f => checked ? state.selected.add(f.id) : state.selected.delete(f.id));
  renderFiles();
}
document.getElementById('selectAllShareHeader').addEventListener('change', e => handleSelectAll(e.target.checked));
document.getElementById('selectAllShare').addEventListener('change', e => handleSelectAll(e.target.checked));

// 개별 다운로드
document.getElementById('shareFileList').addEventListener('click', e => {
  const btn = e.target.closest('[data-action="download"]');
  if (!btn) return;
  const id  = Number(btn.dataset.id);
  // TODO: window.location.href = api.downloadUrl(state.token, [id]);
  console.log('download', id);
});

// 전체 다운로드
document.getElementById('btnDownloadAll').addEventListener('click', () => {
  const ids = state.files.map(f => f.id);
  // TODO: window.location.href = api.downloadUrl(state.token, ids);
  console.log('download all', ids);
});

// 선택 다운로드
document.getElementById('btnDownloadSelected').addEventListener('click', () => {
  const ids = [...state.selected];
  // TODO: window.location.href = api.downloadUrl(state.token, ids);
  console.log('download selected', ids);
});

// 검색
document.getElementById('shareSearch').addEventListener('input', e => {
  state.search = e.target.value;
  renderFiles();
});

/* ═══════════════════════════════════════════
   다크 모드
═══════════════════════════════════════════ */
document.getElementById('btnTheme').addEventListener('click', () => {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('iconMoon').toggleAttribute('data-hidden', state.theme === 'dark');
  document.getElementById('iconSun').toggleAttribute('data-hidden',  state.theme === 'light');
});

/* ═══════════════════════════════════════════
   START
   상태 전환 시연: loading(0.8s) → password → files
   비밀번호: 1234
═══════════════════════════════════════════ */
init();
</script>
