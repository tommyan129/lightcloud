<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 복구 — LightCloud</title>
<link rel="stylesheet" href="/static/css/lightcloud.css">
<script>
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
</script>
<style>
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}
.auth-wrap { max-width: 400px; }

/* 스텝 인디케이터 */
.step-bar { display: flex; align-items: center; justify-content: center; }
.step-node {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 600;
  color: var(--text-muted); background: var(--bg);
  transition: all .2s; flex-shrink: 0;
}
.step-node.active { border-color: var(--primary); color: var(--primary); }
.step-node.done   { border-color: #1e8a44; background: #1e8a44; color: #fff; }
.step-line { width: 48px; height: 2px; background: var(--border); transition: background .2s; flex-shrink: 0; }
.step-line.done { background: #1e8a44; }

/* 안내 박스 */
.info-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .75rem 1rem;
  font-size: .78rem; color: var(--text-muted);
  display: flex; flex-direction: column; gap: .35rem;
}
.info-box strong { color: var(--text); font-weight: 600; }
.info-box a { color: var(--primary); text-decoration: none; }
.info-box a:hover { opacity: .75; }

/* 완료 화면 */
.done-icon {
  width: 52px; height: 52px; border-radius: 50%;
  background: color-mix(in srgb, #1e8a44 12%, transparent);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto .75rem;
}
.done-title { font-size: 1rem; font-weight: 700; color: var(--text); text-align: center; margin: 0 0 .25rem; }
.done-sub   { font-size: .82rem; color: var(--text-muted); text-align: center; margin: 0 0 1rem; }
</style>
</head>
<body>

<button class="dark-toggle auth-theme-btn" id="btnTheme" title="Toggle dark mode">
  <svg id="iconMoon" width="15" height="15" viewBox="0 0 16 16" fill="none">
    <path d="M13.5 10A6 6 0 0 1 6 2.5a6 6 0 1 0 7.5 7.5z" fill="currentColor"/>
  </svg>
  <svg id="iconSun" width="15" height="15" viewBox="0 0 16 16" fill="none" data-hidden>
    <circle cx="8" cy="8" r="3" fill="currentColor"/>
    <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </svg>
</button>

<div class="auth-wrap">

  <div class="auth-brand">
    <div class="logo-mark">
      <svg width="20" height="20" viewBox="0 0 14 14" fill="none">
        <path d="M7 1C4.2 1 2 3.2 2 6c-1.1 0-2 .9-2 2s.9 2 2 2h10c1.1 0 2-.9 2-2s-.9-2-2-2c0-2.8-2.2-5-5-5z" fill="white"/>
      </svg>
    </div>
    <h1>비밀번호 복구</h1>
    <p id="stepSubtitle">복구 키로 비밀번호를 재설정하세요</p>
  </div>

  <!-- 스텝 인디케이터 -->
  <div class="step-bar">
    <div class="step-node active" id="node1">1</div>
    <div class="step-line" id="line1"></div>
    <div class="step-node" id="node2">2</div>
    <div class="step-line" id="line2"></div>
    <div class="step-node" id="node3">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
        <path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <!-- STEP 1: 복구 키 입력 -->
  <div id="step1">
    <div class="auth-card">
      <div class="auth-field">
        <label for="username">사용자 명</label>
        <div class="auth-input-wrap">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="6" r="3" stroke="currentColor" stroke-width="1.4"/>
            <path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="text" id="username" placeholder="아이디 입력" autocomplete="username">
        </div>
      </div>

      <div class="auth-field">
        <label for="recoveryKey">복구 키</label>
        <div class="auth-input-wrap">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <circle cx="6" cy="9" r="4" stroke="currentColor" stroke-width="1.4"/>
            <path d="M10 5l4 4M12 3l2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="text" id="recoveryKey" placeholder="복구 키 입력" autocomplete="off">
        </div>
      </div>

      <div class="auth-error" id="err1"></div>

      <button class="auth-submit" id="btnVerify">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" style="display:inline;vertical-align:middle;margin-right:5px">
          <circle cx="6" cy="9" r="4" stroke="currentColor" stroke-width="1.4"/>
          <path d="M10 5l4 4M12 3l2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        복구 키 확인
      </button>

      <div class="info-box">
        <strong>키를 모르시나요?</strong>
        <span>→ 일반 유저: <a href="#">관리자에게 문의</a></span>
        <span>→ admin: <a href="#">부관리자에게 문의</a></span>
      </div>
    </div>
  </div>

  <!-- STEP 2: 새 비밀번호 -->
  <div id="step2" data-hidden>
    <div class="auth-card">
      <div class="auth-field">
        <label for="newPassword">새 비밀번호</label>
        <div class="auth-input-wrap">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 7V5a3 3 0 1 1 6 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="password" id="newPassword" placeholder="새 비밀번호 입력" autocomplete="new-password">
        </div>
        <div class="pw-strength">
          <div class="pw-strength-bar" id="bar1"></div>
          <div class="pw-strength-bar" id="bar2"></div>
          <div class="pw-strength-bar" id="bar3"></div>
        </div>
        <div class="field-hint" id="pwHint"></div>
      </div>

      <div class="auth-field">
        <label for="rePassword">비밀번호 재입력</label>
        <div class="auth-input-wrap">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 7V5a3 3 0 1 1 6 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="password" id="rePassword" placeholder="비밀번호 다시 입력" autocomplete="new-password">
        </div>
        <div class="field-hint" id="reHint"></div>
      </div>

      <div class="auth-error" id="err2"></div>

      <button class="auth-submit" id="btnReset">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" style="display:inline;vertical-align:middle;margin-right:5px">
          <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M5 7V5a3 3 0 1 1 6 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        비밀번호 변경
      </button>
    </div>
  </div>

  <!-- STEP 3: 완료 -->
  <div id="step3" data-hidden>
    <div class="auth-card" style="align-items:center;padding:2.5rem 2rem">
      <div class="done-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M5 12l5 5L20 7" stroke="#1e8a44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="done-title">비밀번호 변경 완료!</p>
      <p class="done-sub">새 비밀번호로 로그인하세요</p>
      <button class="auth-submit" onclick="location.href='/login'">로그인하러 가기</button>
    </div>
  </div>

  <div class="auth-footer">
    <a href="/login">← 로그인으로 돌아가기</a>
  </div>

</div>

<script>
'use strict';

/* 다크 모드 */
document.getElementById('btnTheme').addEventListener('click', () => {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  document.getElementById('iconMoon').toggleAttribute('data-hidden', next === 'dark');
  document.getElementById('iconSun').toggleAttribute('data-hidden',  next === 'light');
  localStorage.setItem('theme', next);
});

/* 스텝 전환 */
let verifiedUsername = '';

function checkSVG() {
  return `<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function goStep(n) {
  [1, 2, 3].forEach(i => document.getElementById(`step${i}`).toggleAttribute('data-hidden', i !== n));

  const subtitles = { 1: '복구 키로 비밀번호를 재설정하세요', 2: '새 비밀번호를 설정하세요', 3: '완료됐어요!' };
  document.getElementById('stepSubtitle').textContent = subtitles[n];

  const node1 = document.getElementById('node1');
  const node2 = document.getElementById('node2');
  const node3 = document.getElementById('node3');
  const line1 = document.getElementById('line1');
  const line2 = document.getElementById('line2');

  [node1, node2, node3].forEach(nd => nd.className = 'step-node');
  [line1, line2].forEach(ln => ln.className = 'step-line');

  if (n === 1) {
    node1.classList.add('active'); node1.innerHTML = '1';
    node2.innerHTML = '2';
    node3.innerHTML = checkSVG();
  } else if (n === 2) {
    node1.classList.add('done'); node1.innerHTML = checkSVG();
    line1.classList.add('done');
    node2.classList.add('active'); node2.innerHTML = '2';
    node3.innerHTML = '3';
  } else {
    node1.classList.add('done'); node1.innerHTML = checkSVG();
    line1.classList.add('done');
    node2.classList.add('done'); node2.innerHTML = checkSVG();
    line2.classList.add('done');
    node3.classList.add('active'); node3.innerHTML = '3';
  }
}

/* 비밀번호 강도 */
function pwScore(pw) {
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw) || /[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw) && pw.length >= 10) score++;
  return score;
}

document.getElementById('newPassword').addEventListener('input', function() {
  const pw = this.value; const score = pwScore(pw);
  const cls = ['weak','medium','strong'];
  ['bar1','bar2','bar3'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'pw-strength-bar';
    if (pw && i < score) el.classList.add(cls[score - 1]);
  });
  const hint = document.getElementById('pwHint');
  if (!pw) { hint.textContent = ''; return; }
  if (score === 1) { hint.textContent = '더 강한 비밀번호를 사용해 보세요'; hint.className = 'field-hint error'; }
  else if (score === 2) { hint.textContent = '적당한 강도예요'; hint.className = 'field-hint'; }
  else { hint.textContent = '강한 비밀번호예요 👍'; hint.className = 'field-hint'; }
});

document.getElementById('rePassword').addEventListener('input', function() {
  const pw = document.getElementById('newPassword').value;
  const re = this.value;
  const hint = document.getElementById('reHint');
  if (!re) { hint.textContent = ''; this.classList.remove('invalid'); return; }
  if (pw === re) {
    hint.textContent = '비밀번호가 일치해요'; hint.className = 'field-hint';
    this.classList.remove('invalid');
  } else {
    hint.textContent = '비밀번호가 다릅니다'; hint.className = 'field-hint error';
    this.classList.add('invalid');
  }
});

/* STEP 1: 복구 키 확인 */
document.getElementById('btnVerify').addEventListener('click', async () => {
  const username    = document.getElementById('username').value.trim();
  const recoveryKey = document.getElementById('recoveryKey').value.trim();
  const errEl       = document.getElementById('err1');
  const btn         = document.getElementById('btnVerify');

  errEl.classList.remove('visible');
  if (!username || !recoveryKey) {
    errEl.textContent = '아이디와 복구 키를 모두 입력해 주세요.';
    errEl.classList.add('visible');
    return;
  }

  btn.disabled = true; btn.textContent = '확인 중…';

  // TODO: POST /recovery/verify { username, recovery_key }
  // const res = await fetch('/recovery/verify', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, recovery_key: recoveryKey}) });
  // if (!res.ok) { errEl.textContent = '복구 키가 올바르지 않습니다.'; errEl.classList.add('visible'); btn.disabled = false; btn.textContent = '복구 키 확인'; return; }

  verifiedUsername = username;
  goStep(2);
  btn.disabled = false; btn.textContent = '복구 키 확인';
});

/* STEP 2: 비밀번호 변경 */
document.getElementById('btnReset').addEventListener('click', async () => {
  const newPw = document.getElementById('newPassword').value;
  const rePw  = document.getElementById('rePassword').value;
  const errEl = document.getElementById('err2');
  const btn   = document.getElementById('btnReset');

  errEl.classList.remove('visible');
  if (!newPw) { errEl.textContent = '새 비밀번호를 입력해 주세요.'; errEl.classList.add('visible'); return; }
  if (newPw !== rePw) { errEl.textContent = '비밀번호가 다릅니다.'; errEl.classList.add('visible'); return; }

  btn.disabled = true; btn.textContent = '변경 중…';

  // TODO: POST /recovery/reset { username, new_password }
  // const res = await fetch('/recovery/reset', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username: verifiedUsername, new_password: newPw}) });
  // if (!res.ok) { errEl.textContent = '오류가 발생했어요. 다시 시도해 주세요.'; errEl.classList.add('visible'); btn.disabled = false; btn.textContent = '비밀번호 변경'; return; }

  goStep(3);
});
</script>
</body>
</html>
